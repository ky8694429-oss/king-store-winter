<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRINT - GAMING WORLD 2026</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        :root { --neon: #00ffff; --gold: #ffcc00; --pink: #ff00ff; }
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; touch-action: none; }
        
        /* دخلة الألعاب */
        #game-loader { position: fixed; inset: 0; background: linear-gradient(45deg, #000, #1a1a1a); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 5px solid var(--neon); }
        .play-btn { background: var(--neon); color: #000; padding: 20px 60px; font-size: 2rem; border-radius: 50px; cursor: pointer; box-shadow: 0 0 50px var(--neon); border: none; font-weight: 900; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* الشاشة الرئيسية */
        canvas { position: absolute; inset: 0; filter: drop-shadow(0 0 10px var(--neon)); }
        #camera-feed { position: absolute; width: 150px; height: 100px; bottom: 20px; left: 20px; border: 2px solid var(--neon); border-radius: 10px; opacity: 0.5; transform: scaleX(-1); }
        
        /* أيقونات Subway */
        .hud-ui { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 500; }
        .game-icon { width: 80px; height: 80px; background: var(--glass); border: 4px solid #fff; border-radius: 20px; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 0 #555; }
        .game-icon:active { transform: translateY(10px); box-shadow: 0 0 0 #555; }
        .game-icon:hover { background: var(--neon); transform: rotate(10deg); }

        .score-board { position: fixed; top: 20px; right: 20px; font-size: 20px; color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        #install-tab { position: fixed; bottom: 20px; right: 20px; background: var(--pink); color: #fff; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div id="game-loader">
    <h1 style="color: var(--neon); margin-bottom: 40px; font-size: 4rem;">PRINT AI</h1>
    <button class="play-btn" onclick="startGame()">P L A Y</button>
    <p style="margin-top: 20px;">[ AUTO-CONTROL ENABLED ]</p>
</div>

<div class="hud-ui">
    <div class="game-icon" id="clear">🗑️</div>
    <div class="game-icon" id="color">🎨</div>
    <div class="game-icon" id="save">💾</div>
</div>

<div class="score-board">COMBO: <span id="combo">0</span></div>
<div id="install-tab">تنزيل اللعبة 🎮</div>

<video id="camera-feed" playsinline></video>
<canvas id="game-canvas"></canvas>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('camera-feed');
let particles = [];
let combo = 0;
let currentColor = '#00ffff';
let audioCtx;

// صوت ألعاب
function playSfx(f, type = 'square') {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type; osc.frequency.value = f;
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function startGame() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    playSfx(440);
    document.getElementById('game-loader').style.display = 'none';
    init();
}

// نظام الجزيئات (Particles)
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.color = color;
        this.size = Math.random() * 10 + 5;
        this.speedX = Math.random() * 6 - 3;
        this.speedY = Math.random() * 6 - 3;
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.size *= 0.95;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
    }
}

// التحكم باللمس والماوس (عشان لو الكاميرا فصلت)
window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
window.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX, e.touches[0].clientY));

function handleMove(x, y) {
    for(let i=0; i<3; i++) particles.push(new Particle(x, y, currentColor));
    combo++;
    document.getElementById('combo').innerText = combo;
    checkButtons(x, y);
}

function checkButtons(x, y) {
    const btns = document.querySelectorAll('.game-icon');
    btns.forEach(btn => {
        const r = btn.getBoundingClientRect();
        if(x > r.left && x < r.right && y > r.top && y < r.bottom) {
            if(!btn.dataset.active) {
                btn.dataset.active = "true";
                trigger(btn.id);
            }
        } else { delete btn.dataset.active; }
    });
}

function trigger(id) {
    playSfx(880, 'sine');
    if(id === 'clear') { particles = []; combo = 0; }
    if(id === 'color') currentColor = `hsl(${Math.random()*360}, 100%, 50%)`;
    if(id === 'save') {
        const link = document.createElement('a');
        link.download = 'PRINT_WIN.png';
        link.href = canvas.toDataURL();
        link.click();
    }
}

// تشغيل الكاميرا والـ AI كخيار إضافي
async function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands: 1, minDetectionConfidence: 0.7});
    hands.onResults(res => {
        if(res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
            const tip = res.multiHandLandmarks[0][8];
            handleMove((1 - tip.x) * canvas.width, tip.y * canvas.height);
        }
    });

    const cam = new Camera(video, {
        onFrame: async () => { await hands.send({image: video}); },
        width: 1280, height: 720
    });
    cam.start().catch(() => console.log("Camera Blocked - Mouse Control Active"));

    function animate() {
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.update(); p.draw();
            if(p.size < 0.5) particles.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }
    animate();
}

// نظام الـ PWA
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    const btn = document.getElementById('install-tab');
    btn.style.display = 'block';
    btn.onclick = () => e.prompt();
});
</script>

<div style="position:fixed; bottom:10px; width:100%; text-align:center; color:var(--neon); font-size:10px; opacity:0.5;">
    2026 POWERED BY KIMO | GAMING ENGINE v1.0
</div>
</body>
</html>
