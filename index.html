<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMO - Digital Magic 2026</title>
    <!-- Manifest لتنزيل الموقع كتطبيق -->
    <link rel="manifest" href="data:application/manifest+json,{'name':'KIMO Magic','short_name':'KIMO','start_url':'.','display':'standalone','background_color':'#000000','theme_color':'#00ffff','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/124/124010.png','sizes':'512x512','type':'image/png'}]}">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        :root { --neon: #00ffff; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #bg-canvas { position: fixed; inset: 0; z-index: -1; transition: 0.5s; }
        #draw-canvas { position: absolute; inset: 0; transform: scaleX(-1); }
        video { display: none; }

        /* أيقونات 3D */
        .ui-panel { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        .icon-3d { 
            width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid var(--neon);
            border-radius: 15px; display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 15px var(--neon);
            transition: 0.3s; position: relative;
        }
        .icon-3d.hovered { transform: translateY(-20px) scale(1.2); background: var(--neon); color: black; box-shadow: 0 0 40px var(--neon); }

        .brand { position: fixed; bottom: 10px; right: 20px; font-weight: bold; color: var(--neon); text-shadow: 0 0 10px var(--neon); font-family: monospace; letter-spacing: 2px; }
        
        #install-btn { position: fixed; top: 20px; right: 20px; display: none; background: var(--neon); color: black; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="install-btn">تنزيل التطبيق 📲</div>
<canvas id="bg-canvas"></canvas>
<video id="input_video"></video>
<canvas id="draw-canvas"></canvas>

<div class="ui-panel">
    <div class="icon-3d" id="btn-clear" data-action="clear">🗑️</div>
    <div class="icon-3d" id="btn-color" data-action="color">🎨</div>
    <div class="icon-3d" id="btn-bg" data-action="bg">🖼️</div>
    <div class="icon-3d" id="btn-save" data-action="save">💾</div>
</div>

<div class="brand">2026 POWERED BY KIMO</div>

<script>
let deferredPrompt;
const drawCanvas = document.getElementById('draw-canvas');
const ctx = drawCanvas.getContext('2d');
const videoElement = document.getElementById('input_video');
let currentColor = '#00ffff';
let currentBG = 0;
const backgrounds = ['#000000', '#0a0a2e', '#1a001a'];

// تتبع الضغط من الهوا
let hoverTimers = {};

function onResults(results) {
    drawCanvas.width = window.innerWidth;
    drawCanvas.height = window.innerHeight;
    ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);

    if (results.multiHandLandmarks) {
        for (const landmarks of results.multiHandLandmarks) {
            const indexTip = landmarks[8];
            const x = (1 - indexTip.x) * drawCanvas.width;
            const y = indexTip.y * drawCanvas.height;

            // رسم مكان الصباع
            ctx.shadowBlur = 20; ctx.shadowColor = currentColor;
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.fill();

            // فحص التصادم مع الأيقونات (الضغط من الهوا)
            checkAirTouch(x, y);
        }
    }
}

function checkAirTouch(x, y) {
    const icons = document.querySelectorAll('.icon-3d');
    icons.forEach(icon => {
        const rect = icon.getBoundingClientRect();
        if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
            icon.classList.add('hovered');
            if (!hoverTimers[icon.id]) {
                hoverTimers[icon.id] = setTimeout(() => executeAction(icon.dataset.action), 1000);
            }
        } else {
            icon.classList.remove('hovered');
            clearTimeout(hoverTimers[icon.id]);
            delete hoverTimers[icon.id];
        }
    });
}

function executeAction(action) {
    if (action === 'clear') ctx.clearRect(0,0,9000,9000);
    if (action === 'color') currentColor = ['#ff00ff', '#00ffff', '#ffff00'][Math.floor(Math.random()*3)];
    if (action === 'bg') {
        currentBG = (currentBG + 1) % backgrounds.length;
        document.body.style.background = backgrounds[currentBG];
    }
    if (action === 'save') {
        const link = document.createElement('a');
        link.download = 'KIMO_2026.png';
        link.href = drawCanvas.toDataURL();
        link.click();
    }
}

// تشغيل الـ AI
const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7});
hands.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 1280, height: 720
});
camera.start();

// إشعار تحميل التطبيق
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-btn').style.display = 'block';
});

document.getElementById('install-btn').addEventListener('click', () => {
    deferredPrompt.prompt();
    document.getElementById('install-btn').style.display = 'none';
});
</script>
</body>
</html>
