<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع السحر الرقمي - Hand & Face Art with Sound</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; opacity: 0.15; }
        canvas { position: absolute; transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
        
        .ui-panel { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .btn { background: rgba(255, 255, 255, 0.05); border: 1px solid cyan; color: cyan; padding: 12px 24px; cursor: pointer; backdrop-filter: blur(10px); border-radius: 8px; font-weight: bold; transition: 0.3s; text-align: center; }
        .btn:hover { background: cyan; color: black; box-shadow: 0 0 20px cyan; transform: scale(1.05); }
        
        #controls-info { position: absolute; top: 20px; right: 20px; text-align: right; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; border-right: 5px solid cyan; pointer-events: none; }
        h2 { margin: 0 0 10px 0; color: cyan; font-size: 18px; }
        p { margin: 5px 0; font-size: 14px; color: #ccc; }
        
        /* رسالة تفعيل الصوت */
        #audio-prompt { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="audio-prompt">
    <h2>اضغط هنا لتفعيل تجربة الصوت السحرية 🔊</h2>
    <div class="btn" onclick="startExperience()">ابدأ التجربة</div>
</div>

<div id="container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
    
    <div class="ui-panel">
        <div class="btn" onclick="clearCanvas(); playClick();">❌ مسح الرسم</div>
        <div class="btn" onclick="changeColor('#00ffff'); playClick();">🔵 أزرق نيون</div>
        <div class="btn" onclick="changeColor('#ff00ff'); playClick();">🔴 فوشيا</div>
        <div class="btn" onclick="changeColor('#ffff00'); playClick();">🟡 أصفر</div>
        <div class="btn" onclick="saveImage(); playClick();" style="border-color: #00ff00; color: #00ff00; margin-top: 20px;">💾 حفظ الصورة</div>
    </div>

    <div id="controls-info">
        <h2>التحكم السحري ✨</h2>
        <p>1. صباعك بيرسم وبيعمل مزيكا</p>
        <p>2. وشك بيتحول لخطوط رقمية</p>
        <p>3. حرك إيدك قدام الكاميرا للتفاعل</p>
    </div>
</div>

<script>
// --- إعدادات الصوت ---
let audioCtx;
let oscillator;
let gainNode;

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    oscillator = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();
    
    oscillator.type = 'sine';
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
}

function playClick() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'square';
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

function startExperience() {
    document.getElementById('audio-prompt').style.display = 'none';
    initAudio();
    runDetections();
}

// --- إعدادات الكاميرا والـ AI ---
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');

let currentColor = '#00ffff';
let drawingPoints = [];

function clearCanvas() { drawingPoints = []; }
function changeColor(color) { currentColor = color; }

function saveImage() {
    const link = document.createElement('a');
    link.download = 'MagicArt_Kimo.png';
    link.href = canvasElement.toDataURL('image/png');
    link.click();
}

function onResults(results) {
    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    
    // رسم الوش
    if (results.faceLandmarks) {
        drawConnectors(canvasCtx, results.faceLandmarks, FACEMESH_TESSELATION, {color: '#ffffff20', lineWidth: 0.5});
        drawConnectors(canvasCtx, results.faceLandmarks, FACEMESH_RIGHT_EYE, {color: currentColor, lineWidth: 1});
        drawConnectors(canvasCtx, results.faceLandmarks, FACEMESH_LEFT_EYE, {color: currentColor, lineWidth: 1});
    }

    // رسم الإيد والصوت
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        for (const landmarks of results.multiHandLandmarks) {
            const indexFingerTip = landmarks[8];
            const x = indexFingerTip.x * canvasElement.width;
            const y = indexFingerTip.y * canvasElement.height;
            
            drawingPoints.push({ x, y, color: currentColor });
            
            // تحديث الصوت بناءً على الارتفاع (Y)
            if (audioCtx) {
                const freq = 200 + (1 - indexFingerTip.y) * 800;
                oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
                gainNode.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.05);
            }

            drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 1});
            drawLandmarks(canvasCtx, landmarks, {color: currentColor, radius: 4});
        }
    } else {
        if (gainNode) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    }
    
    // رسم الخطوط
    if (drawingPoints.length > 1) {
        canvasCtx.lineWidth = 5;
        canvasCtx.lineCap = 'round';
        for(let i = 1; i < drawingPoints.length; i++) {
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = drawingPoints[i].color;
            canvasCtx.moveTo(drawingPoints[i-1].x, drawingPoints[i-1].y);
            canvasCtx.lineTo(drawingPoints[i].x, drawingPoints[i].y);
            canvasCtx.stroke();
        }
    }
    canvasCtx.restore();
}

const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });

async function runDetections() {
    const camera = new Camera(videoElement, {
        onFrame: async () => {
            const faceResults = await faceMesh.send({image: videoElement});
            const handResults = await hands.send({image: videoElement});
        },
        width: 1280, height: 720
    });
    camera.start();
}

faceMesh.onResults((faceRes) => {
    hands.onResults((handRes) => {
        onResults({...faceRes, ...handRes});
    });
});
</script>
</body>
</html>
