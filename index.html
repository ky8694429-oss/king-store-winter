<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMO QUANTUM 2026</title>
    <link rel="manifest" href="data:application/manifest+json,{'name':'KIMO QUANTUM','short_name':'KIMO','start_url':'.','display':'standalone','background_color':'#000000','theme_color':'#00ffff','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/2091/2091665.png','sizes':'512x512','type':'image/png'}]}">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        :root { --neon: #00ffff; --cyan-glow: 0 0 15px #00ffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }

        /* دخلة الماتريكس */
        #matrix-loader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .glitch { font-size: 3rem; font-weight: bold; text-transform: uppercase; position: relative; text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; animation: glitch 725ms infinite; }
        @keyframes glitch { 0% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; } 15% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; } 16% { text-shadow: -0.05em -0.025em 0 #00fffc, 0.025em 0.035em 0 #fc00ff, -0.05em -0.05em 0 #fffc00; } 100% { text-shadow: -0.025em 0 0 #00fffc, -0.025em -0.025em 0 #fc00ff, -0.025em -0.05em 0 #fffc00; } }

        /* الواجهة الرئيسية */
        canvas { position: absolute; inset: 0; transform: scaleX(-1); }
        #segmentation-canvas { filter: drop-shadow(0 0 10px var(--neon)) contrast(150%); opacity: 0.7; }
        video { display: none; }

        /* نظام الأيقونات العائم */
        .hud-dock { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 500; background: rgba(0, 255, 255, 0.05); padding: 20px; border-radius: 100px; border: 1px solid var(--neon); backdrop-filter: blur(10px); }
        .hud-icon { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--neon); display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; transition: 0.3s; position: relative; background: #000; box-shadow: var(--cyan-glow); }
        .hud-icon:hover, .hud-icon.active-hover { transform: scale(1.4) rotate(360deg); background: var(--neon); color: #000; }
        
        /* مؤشر التحميل الدائري */
        #cursor-ring { position: fixed; width: 80px; height: 80px; border: 3px solid var(--neon); border-radius: 50%; border-top-color: transparent; pointer-events: none; display: none; z-index: 2000; animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* براند كيمو */
        .kimo-tag { position: fixed; top: 20px; right: 20px; font-size: 14px; color: var(--neon); letter-spacing: 3px; border-right: 3px solid var(--neon); padding-right: 10px; }
        
        /* زر التنزيل */
        #pwa-btn { position: fixed; top: 20px; left: 20px; background: var(--neon); color: #000; padding: 10px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; display: none; animation: pulse 2s infinite; z-index: 1000; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); } }
    </style>
</head>
<body>

<div id="matrix-loader">
    <div class="glitch">KIMO QUANTUM</div>
    <p id="load-status" style="margin-top: 20px; color: var(--neon);">BOOTING NEURAL NETWORK...</p>
</div>

<div id="pwa-btn">INSTALL KIMO APP ⚡</div>

<canvas id="segmentation-canvas"></canvas>
<canvas id="drawing-canvas"></canvas>
<div id="cursor-ring"></div>

<div class="kimo-tag">SYSTEM v4.0 // POWERED BY KIMO 2026</div>

<div class="hud-dock">
    <div class="hud-icon" id="clear-cmd" data-type="action">🧹</div>
    <div class="hud-icon" id="color-cmd" data-type="action">🎨</div>
    <div class="hud-icon" id="save-cmd" data-type="action">💾</div>
</div>

<video id="input_video" playsinline></video>

<script>
const videoElement = document.getElementById('input_video');
const segCanvas = document.getElementById('segmentation-canvas');
const drawCanvas = document.getElementById('drawing-canvas');
const sCtx = segCanvas.getContext('2d');
const dCtx = drawCanvas.getContext('2d');
const ring = document.getElementById('cursor-ring');

let brushColor = '#00ffff';
let hoverStart = 0;
let lastTarget = null;
let points = [];

// نظام الصوت التقني
const audio = new (window.AudioContext || window.webkitAudioContext)();
function beep(f, t) {
    const osc = audio.createOscillator();
    const g = audio.createGain();
    osc.frequency.value = f;
    g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + t);
    osc.connect(g); g.connect(audio.destination);
    osc.start(); osc.stop(audio.currentTime + t);
}

function onResults(results) {
    segCanvas.width = drawCanvas.width = window.innerWidth;
    segCanvas.height = drawCanvas.height = window.innerHeight;

    // 1. معالجة الأجسام (تتبع كل شيء)
    sCtx.save();
    sCtx.clearRect(0, 0, segCanvas.width, segCanvas.height);
    sCtx.drawImage(results.segmentationMask, 0, 0, segCanvas.width, segCanvas.height);
    sCtx.globalCompositeOperation = 'source-in';
    sCtx.fillStyle = brushColor;
    sCtx.globalAlpha = 0.4;
    sCtx.fillRect(0,0, segCanvas.width, segCanvas.height);
    sCtx.restore();

    // 2. تتبع الإيد والرسم
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hand = results.multiHandLandmarks[0];
        const indexTip = hand[8];
        const x = (1 - indexTip.x) * drawCanvas.width;
        const y = indexTip.y * drawCanvas.height;

        // رسم مؤشر التحكم
        dCtx.fillStyle = '#fff';
        dCtx.shadowColor = brushColor;
        dCtx.shadowBlur = 20;
        dCtx.beginPath(); dCtx.arc(x, y, 12, 0, Math.PI*2); dCtx.fill();

        handleHover(x, y);
    }
}

function handleHover(x, y) {
    const icons = document.querySelectorAll('.hud-icon');
    let hit = false;
    icons.forEach(icon => {
        const r = icon.getBoundingClientRect();
        if (x > r.left && x < r.right && y > r.top && y < r.bottom) {
            hit = true;
            icon.classList.add('active-hover');
            ring.style.display = 'block';
            ring.style.left = x + 'px';
            ring.style.top = y + 'px';
            
            if (lastTarget !== icon.id) {
                lastTarget = icon.id;
                hoverStart = Date.now();
                beep(600, 0.1);
            } else if (Date.now() - hoverStart > 1000) {
                runCommand(icon.id);
                hoverStart = Date.now() + 5000; // منع تكرار الضغط
            }
        } else {
            icon.classList.remove('active-hover');
        }
    });
    if (!hit) { ring.style.display = 'none'; lastTarget = null; }
}

function runCommand(id) {
    beep(1200, 0.2);
    if (id === 'clear-cmd') sCtx.clearRect(0,0,5000,5000);
    if (id === 'color-cmd') brushColor = `hsl(${Math.random()*360}, 100%, 50%)`;
    if (id === 'save-cmd') {
        const link = document.createElement('a');
        link.download = 'KIMO_2026.png';
        link.href = segCanvas.toDataURL();
        link.click();
    }
}

// تشغيل المحركات
const selfie = new SelfieSegmentation({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`});
selfie.setOptions({modelSelection: 1});

const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands: 1, minDetectionConfidence: 0.7});

const camera = new Camera(videoElement, {
    onFrame: async () => {
        await selfie.send({image: videoElement});
        await hands.send({image: videoElement});
    },
    width: 1280, height: 720
});

selfie.onResults(onResults);

window.onload = () => {
    document.getElementById('load-status').innerText = 'ACCESS GRANTED. WELCOME KIMO.';
    setTimeout(() => {
        document.getElementById('matrix-loader').style.transform = 'translateY(-100%)';
        camera.start();
    }, 2000);
};

// نظام PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); deferredPrompt = e;
    document.getElementById('pwa-btn').style.display = 'block';
});
document.getElementById('pwa-btn').onclick = () => {
    deferredPrompt.prompt();
}
</script>
</body>
</html>
