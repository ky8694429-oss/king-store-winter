<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Gold</title>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold-primary: #D4AF37;
            --gold-dark: #AA7C11;
            --bg-light: #f0f2f5;
            --bg-chat: #efeae2;
            --text-light: #111b21;
            --sidebar-light: #ffffff;
            
            /* قيم الوضع الداكن الافتراضية سيتم تفعيلها عبر الجافاسكريبت */
            --bg-main: var(--bg-light);
            --bg-sidebar: var(--sidebar-light);
            --text-main: var(--text-light);
            --bg-msg-in: #ffffff;
            --bg-msg-out: #d9fdd3;
        }

        .dark-mode {
            --bg-main: #0b141a;
            --bg-sidebar: #111b21;
            --text-main: #e9edef;
            --bg-chat: #0b141a;
            --bg-msg-in: #202c33;
            --bg-msg-out: #005c4b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* شاشة التسجيل */
        #login-screen {
            background: var(--bg-sidebar);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        #login-screen h1 {
            color: var(--gold-primary);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            background: transparent;
            color: var(--text-main);
        }

        .btn-gold {
            background: var(--gold-primary);
            color: #000;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-gold:hover {
            background: var(--gold-dark);
        }

        /* الشاشة الرئيسية للبرنامج */
        #main-app {
            display: none; /* مخفية حتى يتم التسجيل */
            width: 100%;
            height: 100vh;
            max-width: 1600px;
            display: flex;
        }

        /* القائمة الجانبية */
        .sidebar {
            width: 30%;
            min-width: 340px;
            background: var(--bg-sidebar);
            border-left: 1px solid rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            background: var(--bg-sidebar);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold-primary);
        }

        .header-icons i {
            margin-right: 15px;
            cursor: pointer;
            font-size: 20px;
            color: var(--gold-primary);
        }

        /* قائمة المحادثات */
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            padding: 12px 16px;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .chat-item:hover {
            background-color: rgba(0,0,0,0.03);
        }

        .chat-info {
            margin-right: 15px;
            flex: 1;
        }

        .chat-name {
            font-weight: bold;
            font-size: 16px;
        }

        /* منطقة المحادثة النشطة */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            position: relative;
        }

        .chat-window-header {
            background: var(--bg-sidebar);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .active-user-info {
            display: flex;
            align-items: center;
        }

        /* منطقة الرسائل */
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 15px;
            position: relative;
            word-wrap: break-word;
        }

        .msg-in {
            background: var(--bg-msg-in);
            align-self: flex-start;
        }

        .msg-out {
            background: var(--bg-msg-out);
            align-self: flex-end;
        }

        /* شريط الإدخال */
        .chat-input-bar {
            background: var(--bg-sidebar);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-input-bar input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            outline: none;
            background: var(--bg-main);
            color: var(--text-main);
        }

        .chat-input-bar i {
            font-size: 22px;
            color: var(--gold-primary);
            cursor: pointer;
        }

        /* إشعار المكالمات الوهمية */
        .call-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .call-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--gold-primary);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- 1. شاشة تسجيل الدخول -->
    <div id="login-screen">
        <h1>واتساب الذهبي</h1>
        <div class="input-group">
            <label>اسم المستخدم (يظهر للجميع):</label>
            <input type="text" id="username-input" placeholder="اكتب اسمك هنا...">
        </div>
        <div class="input-group">
            <label>رقم الهاتف:</label>
            <input type="tel" id="phone-input" placeholder="01xxxxxxxxx">
        </div>
        <div class="input-group">
            <label>رابط صورة الملف الشخصي (URL):</label>
            <input type="text" id="avatar-input" placeholder="https://example.com/image.jpg">
        </div>
        <button class="btn-gold" onclick="loginUser()">دخول والتفعيل</button>
    </div>

    <!-- 2. واجهة التطبيق الرئيسية (تظهر بعد التسجيل) -->
    <div id="main-app" style="display: none;">
        
        <!-- القائمة الجانبية (الأصدقاء والحالات) -->
        <div class="sidebar">
            <div class="sidebar-header">
                <img id="my-avatar" src="https://via.placeholder.com/40" class="user-avatar" alt="الملف الشخصي">
                <div class="header-icons">
                    <i class="fas fa-circle-notch" title="الحالات" onclick="alert('ميزة الاستوري: يمكنك رفع صورة قريبًا')"></i>
                    <i class="fas fa-comment-medical" title="دردشة جديدة" onclick="addNewContact()"></i>
                    <i class="fas fa-moon" id="theme-btn" title="الوضع الداكن" onclick="toggleDarkMode()"></i>
                </div>
            </div>
            
            <!-- قائمة المحادثات النشطة -->
            <div class="chat-list" id="contacts-list">
                <!-- الأصدقاء الافتراضيين سيتم توليدهم برمجياً -->
            </div>
        </div>

        <!-- نافذة المحادثة المفتوحة -->
        <div class="chat-window">
            
            <!-- رأس المحادثة -->
            <div class="chat-window-header">
                <div class="active-user-info">
                    <img id="active-chat-avatar" src="https://via.placeholder.com/40" class="user-avatar" alt="">
                    <div style="margin-right: 12px;">
                        <div id="active-chat-name" class="chat-name">اختر صديقًا لبدء المحادثة</div>
                        <small style="color: #8696a0;">نشط الآن</small>
                    </div>
                </div>
                <div class="header-icons">
                    <i class="fas fa-video" title="مكالمة فيديو" onclick="startCall('فيديو')"></i>
                    <i class="fas fa-phone" title="مكالمة صوتية" onclick="startCall('صوتية')"></i>
                    <i class="fas fa-ellipsis-v" title="خيارات"></i>
                </div>
            </div>

            <!-- منطقة عرض الرسائل -->
            <div class="messages-container" id="messages-box">
                <div style="text-align: center; color: #8696a0; margin-top: auto;">تشفير واتساب جولد آمن ومفتوح بالكامل بدون قيود.</div>
            </div>

            <!-- شريط الكتابة السفلي -->
            <div class="chat-input-bar">
                <i class="far fa-laugh"></i>
                <i class="fas fa-paperclip" onclick="alert('إرسال الصور والملفات قيد التطوير المتقدم')"></i>
                <input type="text" id="message-input" placeholder="اكتب رسالة..." onkeypress="handleKeyPress(event)">
                <i class="fas fa-microphone" onclick="alert('جاري تسجيل الفويس...')"></i>
                <i class="fas fa-paper-plane" onclick="sendMessage()"></i>
            </div>

            <!-- شاشة واجهة المكالمة الوهمية (صوت وفيديو) -->
            <div class="call-overlay" id="call-screen">
                <img id="call-screen-avatar" src="" class="call-avatar" alt="">
                <h2 id="call-screen-name">صديقك</h2>
                <p id="call-type-text" style="margin-top: 10px; font-size: 18px; color: #D4AF37;">مكالمة جارية...</p>
                <button class="btn-gold" style="background: #ea0038; color: white; width: auto; padding: 10px 30px; margin-top: 30px; border-radius: 50px;" onclick="endCall()">إنهاء المكالمة</button>
            </div>

        </div>
    </div>

    <!-- جافا سكريبت لإدارة العمليات المحلية والواجهة -->
    <script>
        // الذاكرة المؤقتة للتطبيق (في المتصفح)
        let currentUser = null;
        let activeContact = null;
        
        // أصدقاء افتراضيين لتجربة التطبيق مباشرة
        let contacts = [
            { id: "1", name: "أحمد المبرمج", phone: "01000000001", avatar: "https://i.pravatar.cc/150?img=33", messages: [] },
            { id: "2", name: "محمد كيمو", phone: "01200000002", avatar: "https://i.pravatar.cc/150?img=12", messages: [] }
        ];

        // 1. وظيفة تسجيل الدخول
        function loginUser() {
            const name = document.getElementById('username-input').value.trim();
            const phone = document.getElementById('phone-input').value.trim();
            let avatar = document.getElementById('avatar-input').value.trim();

            if (!name || !phone) {
                alert("برجاء إدخال الاسم ورقم الهاتف للتسجيل!");
                return;
            }

            if (!avatar) avatar = "https://via.placeholder.com/150/D4AF37/000000?text=" + name[0];

            currentUser = { name, phone, avatar };

            // تحديث صور وبيانات المستخدم في القائمة
            document.getElementById('my-avatar').src = currentUser.avatar;
            
            // إخفاء شاشة التسجيل وإظهار التطبيق
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';

            renderContacts();
        }

        // 2. تفعيل الوضع الداكن (Dark Mode)
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const themeBtn = document.getElementById('theme-btn');
            if(document.body.classList.contains('dark-mode')) {
                themeBtn.className = "fas fa-sun";
            } else {
                themeBtn.className = "fas fa-moon";
            }
        }

        // 3. عرض قائمة الأصدقاء على الشاشة
        function renderContacts() {
            const listContainer = document.getElementById('contacts-list');
            listContainer.innerHTML = '';

            contacts.forEach(contact => {
                const item = document.createElement('div');
                item.className = 'chat-item';
                item.onclick = () => selectContact(contact);

                item.innerHTML = `
                    <img src="${contact.avatar}" class="user-avatar" alt="">
                    <div class="chat-info">
                        <div class="chat-name">${contact.name}</div>
                        <small style="color: #8696a0;">رقم: ${contact.phone}</small>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        // 4. اختيار صديق لفتح المحادثة معه
        function selectContact(contact) {
            activeContact = contact;
            document.getElementById('active-chat-avatar').src = contact.avatar;
            document.getElementById('active-chat-name').innerText = contact.name;
            
            renderMessages();
        }

        // 5. إضافة صديق جديد برقم الهاتف
        function addNewContact() {
            const name = prompt("أدخل اسم الصديق الجديد:");
            const phone = prompt("أدخل رقم هاتف الصديق:");
            if (name && phone) {
                const newContact = {
                    id: Date.now().toString(),
                    name: name,
                    phone: phone,
                    avatar: "https://via.placeholder.com/150/D4AF37/ffffff?text=" + name[0],
                    messages: []
                };
                contacts.push(newContact);
                renderContacts();
            }
        }

        // 6. إرسال الرسائل وميزة الحذف بدون قيود
        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text || !activeContact) return;

            // إضافة الرسالة الصادرة
            const msgObj = {
                id: Date.now(),
                sender: 'me',
                text: text
            };

            activeContact.messages.push(msgObj);
            input.value = '';
            renderMessages();

            // رد تلقائي وهمي لمحاكاة التفاعل الفوري من الصديق
            setTimeout(() => {
                if (activeContact) {
                    activeContact.messages.push({
                        id: Date.now() + 1,
                        sender: 'them',
                        text: `مرحباً بك! أنا أستقبل رسالتك عبر نسخة واتساب جولد بدون مشاكل 👍`
                    });
                    renderMessages();
                }
            }, 1500);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // 7. عرض الرسائل مع إتاحة الحذف عند النقر المزدوج (بدون قيود الطرفين)
        function renderMessages() {
            const box = document.getElementById('messages-box');
            box.innerHTML = '';

            if (!activeContact) return;

            activeContact.messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.sender === 'me' ? 'msg-out' : 'msg-in'}`;
                msgDiv.innerText = msg.text;
                msgDiv.title = "اضغط مرتين لحذف هذه الرسالة نهائياً";
                
                // ميزة الحذف الفوري بدون قيود
                msgDiv.ondblclick = () => {
                    if (confirm("هل تريد مسح هذه المسدج تمامًا من الطرفين بدون أثر؟")) {
                        activeContact.messages = activeContact.messages.filter(m => m.id !== msg.id);
                        renderMessages();
                    }
                };

                box.appendChild(msgDiv);
            });
            box.scrollTop = box.scrollHeight;
        }

        // 8. محاكاة نظام المكالمات (صوت وصوت وفيديو)
        function startCall(type) {
            if (!activeContact) {
                alert("الرجاء اختيار صديق أولاً لإجراء المكالمة!");
                return;
            }
            document.getElementById('call-screen-avatar').src = activeContact.avatar;
            document.getElementById('call-screen-name').innerText = activeContact.name;
            document.getElementById('call-type-text').innerText = `مكالمة ${type} جارية عبر واتساب جولد...`;
            document.getElementById('call-screen').style.display = 'flex';
        }

        function endCall() {
            document.getElementById('call-screen').style.display = 'none';
        }
    </script>
</body>
</html>
