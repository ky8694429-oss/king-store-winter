<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINT - NEURAL ART 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <style>
        :root { --neon: #00ffff; --pink: #ff00ff; --surface: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* واجهة راقية جداً */
        .air-ui { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; z-index: 1000; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .air-btn { width: 100px; height: 100px; background: var(--surface); border: 2px solid transparent; border-radius: 25px; display: flex; justify-content: center; align-items: center; font-size: 45px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: none; }
        .air-btn.hovered { transform: scale(1.15) translateY(-10px); border-color: var(--neon); box-shadow: 0 20px 40px rgba(0, 255, 255, 0.3); background: rgba(0, 255, 255, 0.1); }
        
        canvas { position: absolute; inset: 0; transform: scaleX(-1); }
        /* الكاميرا مخفية تماماً ولكنها تعمل في الخلفية */
        video { position: absolute; visibility: hidden; pointer-events: none; }
        
        #cursor { position: fixed; width: 20px; height: 20px; background: white; border-radius: 50%; pointer-events: none; z-index: 2000; box-shadow: 0 0 15px #fff; transition: transform 0.1s; display: none; }
        
        .footer { position: fixed; bottom: 20px; left: 30px; color: var(--neon); font-size: 14px; letter-spacing: 3px; font-weight: bold; opacity: 0.8; }
        
        /* أنيميشن الدخول */
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -100%); } to { opacity: 1; transform: translate(-50%, 0); } }
        .air-ui { animation: fadeIn 1s ease-out; }
    </style>
</head>
<body>

<div class="air-ui">
    <div class="air-btn" id="btn-clear">🗑️</div>
    <div class="air-btn" id="btn-brush">🎨</div>
    <div class="air-btn" id="btn-save">💾</div>
</div>

<div id="cursor"></div>
<video id="webcam" autoplay playsinline></video>
<canvas id="main-canvas"></canvas>
<div class="footer">2026 POWERED BY KIMO</div>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');

let points = [];
let color = '#00ffff';
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// صوت نقر احترافي
function playClickSfx() {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

hands.onResults(results => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        cursor.style.display = 'block';
        
        // 1. تجسيد الإيد كخطوط متصلة (Skeleton)
        drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: 'rgba(255, 255, 255, 0.4)', lineWidth: 2});
        drawLandmarks(ctx, landmarks, {color: color, lineWidth: 1, radius: 3});

        const tip = landmarks[8]; // السبابة
        const thumb = landmarks[4]; // الإبهام
        const x = (1 - tip.x) * canvas.width;
        const y = tip.y * canvas.height;

        // تحريك المؤشر مع السبابة
        cursor.style.left = x + 'px';
        cursor.style.top = y + 'px';

        // 2. الرسم بالسبابة (عند ملامسة الإبهام)
        const dist = Math.hypot(tip.x - thumb.x, tip.y - thumb.y);
        if (dist < 0.05) {
            points.push({ x, y, c: color });
        }

        // 3. النقر بالسبابة (تفاعل ذكي)
        checkCollision(x, y);
    } else {
        cursor.style.display = 'none';
    }

    // رسم الخطوط (سلسلة الكتابة)
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = 6;
    for(let i = 1; i < points.length; i++) {
        ctx.strokeStyle = points[i].c;
        ctx.shadowBlur = 10;
        ctx.shadowColor = points[i].c;
        ctx.beginPath();
        ctx.moveTo(points[i-1].x, points[i-1].y);
        ctx.lineTo(points[i].x, points[i].y);
        ctx.stroke();
    }
});

function checkCollision(x, y) {
    const btns = document.querySelectorAll('.air-btn');
    btns.forEach(btn => {
        const r = btn.getBoundingClientRect();
        if (x > r.left && x < r.right && y > r.top && y < r.bottom) {
            if (!btn.classList.contains('hovered')) {
                btn.classList.add('hovered');
                setTimeout(() => {
                    if (btn.classList.contains('hovered')) {
                        playClickSfx();
                        execute(btn.id);
                    }
                }, 1000); // ثانية واحدة للتفعيل
            }
        } else {
            btn.classList.remove('hovered');
        }
    });
}

function execute(id) {
    if (id === 'btn-clear') points = [];
    if (id === 'btn-brush') color = `hsl(${Math.random()*360}, 100%, 60%)`;
    if (id === 'btn-save') {
        const link = document.createElement('a');
        link.download = 'PRINT_KIMO_2026.png';
        link.href = canvas.toDataURL();
        link.click();
    }
}

const camera = new Camera(video, {
    onFrame: async () => { await hands.send({image: video}); },
    width: 1280, height: 720
});
camera.start();
</script>
</body>
</html>
