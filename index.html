<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMO NEURAL 2026</title>
    <link rel="manifest" href="data:application/manifest+json,{'name':'KIMO NEURAL','short_name':'KIMO','start_url':'.','display':'standalone','background_color':'#000000','theme_color':'#00ffff','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/2091/2091665.png','sizes':'512x512','type':'image/png'}]}">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        :root { --neon: #00ffff; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        
        /* الدخلة المرعبة */
        #loader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .glitch-text { font-size: 4rem; color: var(--neon); text-shadow: 2px 2px #ff00ff, -2px -2px #0000ff; animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(0); } 25% { transform: translate(5px, -5px); } 50% { transform: translate(-5px, 5px); } 100% { transform: translate(0); } }

        canvas { position: absolute; inset: 0; transform: scaleX(-1); }
        #output-canvas { filter: drop-shadow(0 0 15px var(--neon)) brightness(1.5); }
        video { display: none; }

        /* أيقونات HUD */
        .ui-panel { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 500; }
        .hud-btn { width: 70px; height: 70px; border: 2px solid var(--neon); border-radius: 15px; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; font-size: 2rem; cursor: pointer; transition: 0.3s; position: relative; }
        .hud-btn::after { content: attr(data-label); position: absolute; left: -80px; font-size: 12px; color: var(--neon); background: rgba(0,255,255,0.1); padding: 5px; border-radius: 5px; opacity: 0; }
        .hud-btn:hover::after { opacity: 1; }
        .hud-btn.active { background: var(--neon); color: #000; transform: scale(1.2); }

        #install-btn { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--neon); color: #000; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; display: none; z-index: 1001; }
    </style>
</head>
<body>

<div id="loader" onclick="startSystem()">
    <div class="glitch-text">KIMO 2026</div>
    <p style="color: var(--neon); margin-top: 20px;">[ اضغط لتفعيل الـ AI والصوت ]</p>
</div>

<div id="install-btn">تنزيل تطبيق كيمو 📲</div>

<video id="webcam" playsinline></video>
<canvas id="output-canvas"></canvas>

<div class="ui-panel">
    <div class="hud-btn" id="clear-btn" data-label="مسح">🗑️</div>
    <div class="hud-btn" id="color-btn" data-label="تغيير">🎨</div>
    <div class="hud-btn" id="save-btn" data-label="حفظ">💾</div>
</div>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('output-canvas');
const ctx = canvas.getContext('2d');
let audioCtx, currentColor = '#00ffff';

// 1. نظام الصوت والدخول
function startSystem() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    playNotification(800, 'sawtooth');
    document.getElementById('loader').style.display = 'none';
    setupAI();
}

function playNotification(f, type) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type; osc.frequency.value = f;
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

// 2. معالجة الـ AI (خطوط مش ألوان ثابتة)
function onResults(results) {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height); // مسح الفريم عشان ميثبتش

    // رسم حدود الجسم (Edges)
    if (results.segmentationMask) {
        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'source-in';
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = 10;
        ctx.strokeRect(0, 0, canvas.width, canvas.height); // إيهام بالخطوط الحركية
        ctx.fillStyle = currentColor;
        ctx.globalAlpha = 0.3;
        ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.restore();
    }

    // تتبع الإيد بدقة
    if (results.multiHandLandmarks) {
        for (const landmarks of results.multiHandLandmarks) {
            // رسم خطوط الهيكل العظمي للإيد (النيون)
            drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color: currentColor, lineWidth: 4});
            drawLandmarks(ctx, landmarks, {color: '#fff', lineWidth: 1, radius: 4});
            
            // تحكم بالأزرار باللمس الهوائي
            checkHUD(landmarks[8].x * canvas.width, landmarks[8].y * canvas.height);
        }
    }
}

function checkHUD(x, y) {
    // عكس الـ X لأن الكانفاس مقلوب
    const realX = canvas.width - x; 
    const btns = document.querySelectorAll('.hud-btn');
    btns.forEach(btn => {
        const r = btn.getBoundingClientRect();
        if (realX > r.left && realX < r.right && y > r.top && y < r.bottom) {
            btn.classList.add('active');
            if(!btn.dataset.hit) {
                btn.dataset.hit = "true";
                triggerAction(btn.id);
            }
        } else {
            btn.classList.remove('active');
            delete btn.dataset.hit;
        }
    });
}

function triggerAction(id) {
    playNotification(1200, 'sine');
    if(id === 'clear-btn') ctx.clearRect(0,0,5000,5000);
    if(id === 'color-btn') currentColor = `hsl(${Math.random()*360}, 100%, 50%)`;
    if(id === 'save-btn') {
        const link = document.createElement('a');
        link.download = 'KIMO_VISION.png';
        link.href = canvas.toDataURL();
        link.click();
    }
}

// 3. تشغيل المحركات
async function setupAI() {
    const selfie = new SelfieSegmentation({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`});
    selfie.setOptions({modelSelection: 1});
    selfie.onResults(onResults);

    const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6});
    hands.onResults(onResults);

    const cam = new Camera(video, {
        onFrame: async () => {
            await selfie.send({image: video});
            await hands.send({image: video});
        }, width: 1280, height: 720
    });
    cam.start();
}

// نظام الـ PWA (تحويل لتطبيق)
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    const btn = document.getElementById('install-btn');
    btn.style.display = 'block';
    btn.onclick = () => e.prompt();
});
</script>
</body>
</html>
