<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINT - AIR MAGIC 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        :root { --neon: #00ffff; --pink: #ff00ff; --yellow: #ffff00; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        
        /* واجهة المستخدم الهوائية */
        .air-ui { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 1000; }
        .air-btn { width: 90px; height: 90px; background: rgba(0,0,0,0.6); border: 4px solid #fff; border-radius: 20px; 
                  display: flex; justify-content: center; align-items: center; font-size: 40px; transition: 0.3s;
                  box-shadow: 0 8px 0 #444, 0 0 20px rgba(255,255,255,0.2); }
        .air-btn.hovered { transform: scale(1.2) translateY(-10px); border-color: var(--neon); box-shadow: 0 15px 30px var(--neon); }
        
        canvas { position: absolute; inset: 0; transform: scaleX(-1); }
        video { position: absolute; width: 180px; bottom: 20px; right: 20px; transform: scaleX(-1); border-radius: 20px; border: 3px solid var(--neon); opacity: 0.7; }
        
        #cursor { position: fixed; width: 30px; height: 30px; border: 3px solid white; border-radius: 50%; 
                  pointer-events: none; z-index: 2000; box-shadow: 0 0 20px #fff; transition: 0.1s; }
        
        .footer { position: fixed; bottom: 10px; left: 20px; color: var(--neon); font-size: 14px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="air-ui">
    <div class="air-btn" id="btn-clear">🗑️</div>
    <div class="air-btn" id="btn-brush">🎨</div>
    <div class="air-btn" id="btn-save">💾</div>
</div>

<div id="cursor"></div>
<video id="webcam" autoplay playsinline></video>
<canvas id="main-canvas"></canvas>
<div class="footer">2026 POWERED BY KIMO</div>

<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');

let points = [];
let color = '#00ffff';
let isDrawing = false;
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// صوت التفاعل
function beep(freq) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.frequency.value = freq;
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

hands.onResults(results => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const tip = landmarks[8]; // السبابة
        const thumb = landmarks[4]; // الإبهام
        
        const x = (1 - tip.x) * canvas.width;
        const y = tip.y * canvas.height;

        // تحريك المؤشر
        cursor.style.left = x + 'px';
        cursor.style.top = y + 'px';

        // حساب المسافة بين السبابة والإبهام (عشان نرسم لما يلمسوا بعض في الهوا)
        const dist = Math.hypot(tip.x - thumb.x, tip.y - thumb.y);
        
        if (dist < 0.05) { // لو قربت صوابعك من بعض "كأنك ماسك قلم"
            points.push({ x, y, c: color });
            cursor.style.background = color;
        } else {
            cursor.style.background = 'transparent';
        }

        checkCollision(x, y);
    }

    // رسم الخطوط بستايل نيون
    ctx.lineCap = 'round';
    ctx.lineWidth = 8;
    ctx.shadowBlur = 15;
    for(let i = 1; i < points.length; i++) {
        ctx.strokeStyle = points[i].c;
        ctx.shadowColor = points[i].c;
        ctx.beginPath();
        ctx.moveTo(points[i-1].x, points[i-1].y);
        ctx.lineTo(points[i].x, points[i].y);
        ctx.stroke();
    }
});

function checkCollision(x, y) {
    const btns = document.querySelectorAll('.air-btn');
    btns.forEach(btn => {
        const r = btn.getBoundingClientRect();
        if (x > r.left && x < r.right && y > r.top && y < r.bottom) {
            if (!btn.classList.contains('hovered')) {
                btn.classList.add('hovered');
                beep(800);
                setTimeout(() => execute(btn.id), 800); // تفعيل بعد ثبات نص ثانية
            }
        } else {
            btn.classList.remove('hovered');
        }
    });
}

function execute(id) {
    if (id === 'btn-clear') { points = []; beep(200); }
    if (id === 'btn-brush') { color = `hsl(${Math.random()*360}, 100%, 50%)`; beep(1200); }
    if (id === 'btn-save') {
        const link = document.createElement('a');
        link.download = 'PRINT_KIMO_ART.png';
        link.href = canvas.toDataURL();
        link.click();
    }
}

const camera = new Camera(video, {
    onFrame: async () => { await hands.send({image: video}); },
    width: 1280, height: 720
});
camera.start();
</script>
</body>
</html>
