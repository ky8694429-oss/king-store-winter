<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ZENON AETHER-OS | ULTIMATE EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

    <style>
        :root { --main-red: #8B0000; --glow: #ff0000; --dark-zone: #050505; }
        body { margin: 0; background: black; color: var(--main-red); font-family: 'Courier New', monospace; overflow: hidden; }

        /* العلامة المائية KIMO */
        #watermark { position: fixed; bottom: 10px; right: 10px; opacity: 0.1; font-size: 80px; z-index: 1000; pointer-events: none; }

        /* الكاميرا */
        #input_video { position: fixed; bottom: 20px; left: 20px; width: 200px; border: 1px solid var(--main-red); opacity: 0.4; z-index: 100; transform: scaleX(-1); border-radius: 10px; }
        #output_canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 99; }

        /* واجهة المستخدم */
        .os-container { padding: 20px; text-align: center; position: relative; z-index: 10; }
        .glitch-title { font-size: 3.5rem; font-weight: bold; text-shadow: 2px 2px var(--main-red); animation: scan 2s infinite; }

        #search-bar { width: 60%; height: 50px; background: #0a0a0a; border: 2px solid var(--main-red); color: #fff; font-size: 1.2rem; text-align: center; border-radius: 5px; box-shadow: 0 0 15px #ff000033; }

        /* الكيبورد الهوائي */
        #air-keyboard { 
            display: none; grid-template-columns: repeat(10, 1fr); gap: 5px; 
            width: 70%; margin: 20px auto; background: #080808; padding: 15px; border: 1px dashed var(--main-red);
        }
        .key { padding: 10px; background: #111; border: 1px solid #333; cursor: pointer; color: #666; font-size: 14px; }
        .key.hovered { background: var(--main-red); color: white; box-shadow: 0 0 10px var(--glow); }

        /* نظام عرض النتائج المطور */
        #zenon-results { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; width: 90%; margin: 30px auto; height: 400px; overflow-y: auto; padding: 10px;
        }
        .zenon-card { 
            background: #0a0000; border: 1px solid var(--main-red); padding: 15px; 
            position: relative; transition: 0.3s; clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
        }
        .zenon-card:hover { border-color: var(--glow); transform: translateY(-5px); }
        .zenon-card h3 { color: white; margin: 0; font-size: 16px; }
        .zenon-card p { font-size: 12px; color: #888; }

        #cursor { position: fixed; width: 20px; height: 20px; border: 2px solid white; border-radius: 50%; pointer-events: none; z-index: 1001; background: rgba(255,0,0,0.3); }

        @keyframes scan { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="watermark">KIMO</div>
    <div id="cursor"></div>
    <video id="input_video" autoplay muted></video>
    <canvas id="output_canvas"></canvas>

    <div class="os-container">
        <div class="glitch-title">ZENON_AETHER.SYS</div>
        
        <input type="text" id="search-bar" placeholder="[ FOCUS TO OPEN KEYS ]" readonly>

        <div id="air-keyboard">
            </div>

        <div class="dock" style="margin-top:20px; display:flex; justify-content:center; gap:20px;">
            <div class="air-btn" id="voice-trigger" style="padding:15px; border:1px solid red;">VOICE_COMMAND</div>
            <div class="air-btn" id="clear-trigger" style="padding:15px; border:1px solid red;">WIPE_DATA</div>
        </div>

        <div id="zenon-results">
            </div>
    </div>

    <audio id="hacker-click" src="https://www.soundjay.com/communication/typing-single-key-01.mp3"></audio>

    <script>
        const keys = "QWERTYUIOPASDFGHJKLZXCVBNM1234567890".split("");
        const kbd = document.getElementById('air-keyboard');
        const searchBar = document.getElementById('search-bar');
        const clickSound = document.getElementById('hacker-click');
        const resultsArea = document.getElementById('zenon-results');

        // بناء الكيبورد
        keys.forEach(k => {
            const div = document.createElement('div');
            div.className = 'key air-btn';
            div.innerText = k;
            div.id = 'key-' + k;
            kbd.appendChild(div);
        });

        // نفس منطق الـ MediaPipe السابق مع تطوير الـ Trigger
        // [هنا يتم وضع كود الـ Hands اللي بعتهولك قبل كدة مع التعديل ده]
        
        function triggerAction(id) {
            clickSound.play(); // صوت الهكر الحقيقي
            
            if(id === 'search-bar') {
                kbd.style.display = 'grid'; // إظهار الكيبورد
            }
            
            if(id.startsWith('key-')) {
                const char = id.split('-')[1];
                searchBar.value += char;
                // محاكاة بحث فوري
                updateResults(searchBar.value);
            }

            if(id === 'clear-trigger') {
                searchBar.value = '';
                resultsArea.innerHTML = '';
                kbd.style.display = 'none';
            }
        }

        function updateResults(query) {
            resultsArea.innerHTML = `
                <div class="zenon-card">
                    <h3>RESULT_FOR: ${query}</h3>
                    <p>Zenon AI has intercepted 1024 packets related to your request. Source: SECURE_CORE.</p>
                </div>
            `;
        }
        
        // [كود الكاميرا والـ Cursor يوضع هنا ليعمل التحكم بالهواء]
    </script>
</body>
</html>
