<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMO PRIME 2026</title>
    <link rel="manifest" href="data:application/manifest+json,{'name':'KIMO PRIME','short_name':'KIMO','start_url':'.','display':'standalone','background_color':'#000000','theme_color':'#00ffff','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/3659/3659751.png','sizes':'512x512','type':'image/png'}]}">
    
    <!-- مكاتب الذكاء الاصطناعي -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>

    <style>
        :root { --neon: #00ffff; --glass: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; outline: none; }
        body { margin: 0; background: #000; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        /* شاشة الدخول */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
        .scanner { width: 200px; height: 2px; background: var(--neon); box-shadow: 0 0 20px var(--neon); animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { transform: translateY(-50px); } 50% { transform: translateY(50px); } }

        /* الشاشات واللوحات */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; border: 20px solid rgba(0, 255, 255, 0.05); }
        video { display: none; }
        canvas { position: absolute; inset: 0; transform: scaleX(-1); }
        #bg-fx { filter: blur(5px) brightness(0.5); }

        /* القائمة الاحترافية */
        .dock { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 15px; padding: 15px; background: var(--glass);
            backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto; z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .icon { 
            width: 60px; height: 60px; display: flex; justify-content: center; align-items: center;
            font-size: 24px; border-radius: 18px; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0,0,0,0.5); border: 1px solid transparent; position: relative;
        }
        .icon.active-air { transform: scale(1.3) translateY(-10px); border-color: var(--neon); box-shadow: 0 0 20px var(--neon); }
        
        /* حلقة التحميل عند الضغط من الهواء */
        .progress-ring { 
            position: absolute; width: 80px; height: 80px; border: 4px solid transparent;
            border-top-color: var(--neon); border-radius: 50%; display: none; 
            transform: translate(-50%, -50%); pointer-events: none; z-index: 2000;
        }

        .brand-text { position: fixed; bottom: 10px; right: 20px; font-size: 12px; color: var(--neon); opacity: 0.6; pointer-events: none; }
        #install-prompt { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--neon); color: black; padding: 10px 30px; border-radius: 50px;
            font-weight: bold; cursor: pointer; display: none; z-index: 10000; box-shadow: 0 0 30px var(--neon);
        }
    </style>
</head>
<body>

<div id="loader">
    <h1 style="color: var(--neon); letter-spacing: 5px;">KIMO PRIME SYSTEM</h1>
    <div class="scanner"></div>
    <p>INITIALIZING AI CORE...</p>
</div>

<div id="install-prompt" onclick="installApp()">تثبيت تطبيق كيمو 2026 📲</div>

<canvas id="bg-fx"></canvas>
<canvas id="main-canvas"></canvas>
<video id="webcam" playsinline></video>
<div class="progress-ring" id="ring"></div>

<div id="ui-layer">
    <div class="dock">
        <div class="icon" id="btn-clear" data-hint="مسح">🗑️</div>
        <div class="icon" id="btn-brush" data-hint="فرشاة">🖌️</div>
        <div class="icon" id="btn-color" data-hint="لون">🌈</div>
        <div class="icon" id="btn-bg" data-hint="خلفية">🌌</div>
        <div class="icon" id="btn-save" data-hint="حفظ">💾</div>
    </div>
</div>

<div class="brand-text">POWERED BY KIMO © 2026 | VERSION 4.0.1</div>

<script>
const video = document.getElementById('webcam');
const mainCanvas = document.getElementById('main-canvas');
const bgCanvas = document.getElementById('bg-fx');
const mCtx = mainCanvas.getContext('2d');
const bCtx = bgCanvas.getContext('2d');
const ring = document.getElementById('ring');

let drawing = [];
let brushColor = '#00ffff';
let airHover = { id: null, startTime: 0 };
let currentBrushType = 'neon';

// نظام الصوت المتطور
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type = 'sine', duration = 0.1) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

// معالجة الأجسام والإيد
function onResults(results) {
    mainCanvas.width = bgCanvas.width = window.innerWidth;
    mainCanvas.height = bgCanvas.height = window.innerHeight;
    
    mCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    
    // 1. رسم أي جسم قدام الكاميرا (Segmentation)
    if (results.segmentationMask) {
        bCtx.save();
        bCtx.clearRect(0,0, bgCanvas.width, bgCanvas.height);
        bCtx.drawImage(results.segmentationMask, 0, 0, bgCanvas.width, bgCanvas.height);
        bCtx.globalCompositeOperation = 'source-in';
        bCtx.fillStyle = brushColor + '44';
        bCtx.fillRect(0,0, bgCanvas.width, bgCanvas.height);
        bCtx.restore();
    }

    // 2. تتبع الإيد والضغط من الهوا
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hand = results.multiHandLandmarks[0];
        const indexTip = hand[8];
        const x = (1 - indexTip.x) * mainCanvas.width;
        const y = indexTip.y * mainCanvas.height;

        // رسم مؤشر الصباع
        mCtx.shadowBlur = 15; mCtx.shadowColor = brushColor;
        mCtx.fillStyle = "white"; mCtx.beginPath(); mCtx.arc(x, y, 8, 0, Math.PI*2); mCtx.fill();

        handleAirUI(x, y);
    }
}

function handleAirUI(x, y) {
    const icons = document.querySelectorAll('.icon');
    let found = false;
    
    icons.forEach(icon => {
        const rect = icon.getBoundingClientRect();
        if (x > rect.left && x < rect.right && y > rect.top && y < rect.bottom) {
            found = true;
            icon.classList.add('active-air');
            ring.style.display = 'block';
            ring.style.left = x + 'px';
            ring.style.top = y + 'px';

            if (!airHover.id || airHover.id !== icon.id) {
                airHover = { id: icon.id, startTime: Date.now() };
                playSound(440, 'square', 0.05);
            } else if (Date.now() - airHover.startTime > 1200) {
                triggerAction(icon.id);
                airHover = { id: null, startTime: 0 };
            }
        } else {
            icon.classList.remove('active-air');
        }
    });

    if (!found) {
        ring.style.display = 'none';
        airHover = { id: null, startTime: 0 };
    }
}

function triggerAction(id) {
    playSound(880, 'sine', 0.2);
    if (id === 'btn-clear') mCtx.clearRect(0,0,5000,5000);
    if (id === 'btn-color') brushColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
    if (id === 'btn-save') {
        const link = document.createElement('a');
        link.download = 'KIMO_MASTERPIECE.png';
        link.href = mainCanvas.toDataURL();
        link.click();
    }
}

// تهيئة الكاميرا والموديلات
const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8});

const selfie = new SelfieSegmentation({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`});
selfie.setOptions({modelSelection: 1});

const camera = new Camera(video, {
    onFrame: async () => {
        await selfie.send({image: video});
        await hands.send({image: video});
    },
    width: 1280, height: 720
});

// إخفاء الـ Loader وبدء التشغيل
window.onload = () => {
    setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').remove(), 800);
        camera.start();
    }, 2500);
};

// نظام الـ PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); deferredPrompt = e;
    document.getElementById('install-prompt').style.display = 'block';
});

function installApp() {
    deferredPrompt.prompt();
    document.getElementById('install-prompt').style.display = 'none';
}
</script>
</body>
</html>
